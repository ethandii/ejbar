  <link rel="manifest" href="manifest.webmanifest">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: "Vazirmatn", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    :root {
      --bg: #F2F2F7;
      --card: rgba(255,255,255,0.72);
      --stroke: rgba(60,60,67,0.18);
      --stroke-strong: rgba(60,60,67,0.28);
      --text: #111111;
      --text-secondary: rgba(60,60,67,0.72);
      --text-tertiary: rgba(60,60,67,0.45);
      --blue: #007AFF;
      --green: #34C759;
      --red: #FF3B30;
      --orange: #FF9500;
      --shadow-1: 0 1px 1px rgba(0,0,0,0.06), 0 6px 18px rgba(0,0,0,0.06);
      --shadow-2: 0 10px 30px rgba(0,0,0,0.10);
      --brm: 1;
      --radius: calc(22px * var(--brm));
      --corner-shape: squircle;
      --blur: blur(24px) saturate(180%);
    }

    @supports (corner-shape: squircle) {
      :root { --brm: 2; }
    }

    [data-theme="dark"] {
      --bg: #000000;
      --card: rgba(28,28,30,0.72);
      --card-solid: #1C1C1E;
      --stroke: rgba(84,84,88,0.65);
      --stroke-strong: rgba(84,84,88,0.80);
      --text: #FFFFFF;
      --text-secondary: rgba(235,235,245,0.72);
      --text-tertiary: rgba(235,235,245,0.45);
      --shadow-1: 0 1px 1px rgba(0,0,0,0.40), 0 10px 26px rgba(0,0,0,0.45);
      --shadow-2: 0 12px 34px rgba(0,0,0,0.55);
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
      min-height: 100%;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding: calc(env(safe-area-inset-top) + 10px) 14px 18px;
      background: linear-gradient(to bottom, rgba(242,242,247,0.92) 0%, rgba(242,242,247,0.78) 55%, rgba(242,242,247,0.00) 100%);
      backdrop-filter: var(--blur);
    }

    [data-theme="dark"] .nav {
      background: linear-gradient(to bottom, rgba(0,0,0,0.90) 0%, rgba(0,0,0,0.62) 55%, rgba(0,0,0,0.00) 100%);
    }

    .nav::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 22px;
      box-shadow: 0 12px 18px rgba(0,0,0,0.06);
      pointer-events: none;
      opacity: 0.22;
    }

    [data-theme="dark"] .nav::after {
      box-shadow: 0 14px 22px rgba(0,0,0,0.55);
      opacity: 0.35;
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px 2px;
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.6px;
      line-height: 1.1;
    }

    .icon-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 38px;
      padding: 0 12px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.35);
      backdrop-filter: var(--blur);
      user-select: none;
      color: var(--text);
    }

    [data-theme="dark"] .icon-chip { background: rgba(28,28,30,0.55); }

    .icon-chip .emoji { font-size: 18px; }
    .icon-chip .small { font-size: 12px; color: var(--text-secondary); font-weight: 700; }

    .nav-actions { display: flex; align-items: center; gap: 10px; }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.35);
      backdrop-filter: var(--blur);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: transform 120ms ease, background 120ms ease;
    }

    [data-theme="dark"] .icon-btn { background: rgba(28,28,30,0.55); }
    .icon-btn:active { transform: scale(0.96); }

    .icon-btn.lang-btn { border-color: var(--stroke); color: #1C1C1E; }
    [data-theme="dark"] .icon-btn.lang-btn { background: rgba(28,28,30,0.55); border-color: var(--stroke); color: #FFFFFF; }
    .icon-btn.lang-btn:active { opacity: 0.8; }

    .theme-lottie-wrap { position: relative; width: 24px; height: 24px; }
    .theme-lottie { position: absolute; inset: 0; transition: opacity 380ms ease; pointer-events: none; }
    [data-theme="dark"] .theme-lottie { filter: brightness(0) invert(1); }

    .section {
      margin: 10px 0 14px;
      padding: 14px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      background: var(--card);
      backdrop-filter: var(--blur);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title h2 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.2px;
    }

    .hint {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-tertiary);
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(118,118,128,0.12);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      padding: 3px;
      gap: 3px;
      margin: 8px 0 14px;
    }

    [data-theme="dark"] .segmented { background: rgba(118,118,128,0.24); }

    .seg-btn {
      appearance: none;
      border: none;
      background: transparent;
      padding: 10px 12px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
      transition: background 140ms ease, transform 120ms ease;
    }

    .seg-btn.selected {
      background: #0A84FF;
      color: #fff;
    }

    .seg-btn:active { transform: scale(0.985); }

    .segmented-3 {
      grid-template-columns: repeat(3, 1fr);
    }


    .ejbar-btn-wrap {
      position: relative;
    }

    .ejbar-btn-wrap > .seg-btn {
      width: 100%;
      height: 100%;
    }

    @keyframes dropdown-in {
      from { opacity: 0; transform: translateY(-6px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes dropdown-out {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-6px) scale(0.96); }
    }
    @keyframes btn-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .ejbar-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow-2);
      z-index: 200;
      overflow: hidden;
      transform-origin: top center;
      animation: dropdown-in 220ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .ejbar-dropdown.closing {
      animation: dropdown-out 160ms ease-in forwards;
    }

    .ejbar-opt {
      display: block;
      width: 100%;
      padding: 14px 16px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--stroke);
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      text-align: center;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .ejbar-opt:last-child { border-bottom: none; }
    .ejbar-opt:active { transform: scale(0.985); background: #0A84FF; color: #fff; }
    .ejbar-opt.selected { background: #0A84FF; color: #fff; }

    .btn-pop {
      animation: btn-pop 200ms ease-in-out forwards;
    }


    .direct-score-input {
      width: 100%;
      padding: 14px 12px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.62);
      backdrop-filter: var(--blur);
      color: var(--text);
      font-size: 26px;
      font-weight: 900;
      text-align: center;
      outline: none;
      direction: ltr;
      unicode-bidi: isolate;
    }

    [data-theme="dark"] .direct-score-input { background: rgba(28,28,30,0.58); }

    .direct-score-input:focus {
      outline: none;
      border-color: rgba(0,122,255,0.55);
    }

    .direct-input-row {
      position: relative;
      display: block;
    }

    .direct-input-row .direct-score-input {
      width: 100%;
      padding-left: 54px;
    }

    .minus-btn {
      position: absolute;
      left: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;

    .picker-wrap {

      border: 1px solid var(--stroke);

      touch-action: none;
      cursor: grab;

    [data-theme="dark"] .picker-wrap {

    .picker-wrap:active { cursor: grabbing; }

    .picker-scroll {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      will-change: transform;
      transition: none;
    }

    .picker-scroll.snapping {
      transition: transform 320ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .picker-wrap {
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .picker-wrap.is-dragging {
      transform: scale(1.02);
      box-shadow: 0 14px 28px rgba(0,0,0,0.10);
    }

    .picker-item {
      transition: color 120ms ease, transform 120ms ease, opacity 120ms ease, filter 120ms ease;

    .picker-item.selected {
      filter: saturate(1.1);

    .picker-item {

      z-index: 3;

    (function() {
      function makeAppleTouchPNG() {
        const svgLink = document.querySelector('link[rel="icon"]');
        const appleLink = document.querySelector('link[rel="apple-touch-icon"]');
        if (!svgLink || !appleLink) return;
        const img = new Image();
        img.onload = function() {
          try {
            const c = document.createElement('canvas');
            c.width = c.height = 180;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 180, 180);
            ctx.drawImage(img, 0, 0, 180, 180);
            appleLink.href = c.toDataURL('image/png');
          } catch (e) {}
        };
        img.src = svgLink.getAttribute('href');
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', makeAppleTouchPNG);
      } else {
        makeAppleTouchPNG();
      }
    })();
  </script>

  <!-- scroll picker JS replaces virtual keyboard -->

  <script>
    /*
    ========== EJBAR GAME - JAVASCRIPT INDEX =========

    1. DOM INITIALIZATION & CORE CONSTANTS (1136-1220)
       - initDOMElements(): Cache all DOM elements in $ object
       - GAME STATE: Central game state object
       - CONSTANTS: Score targets, storage keys, haptic feedback

    2. GAME STATE PERSISTENCE (1222-1273)
       - saveGameState(): Save to localStorage
       - loadGameState(): Load from localStorage
       - saveArchive(), getArchive(): Archive management

    3. ARCHIVE & GAME HISTORY (1275-1472)
       - renderArchive(): Display completed games
       - archiveCurrentGame(): Save current game to archive
       - formatArchiveDate(), formatSignedScore(): Display helpers
       - openArchiveDetails(), closeArchiveDetails(): Archive detail view

    4. GAME RULES & SCORING FUNDAMENTALS (1474-1620)
       - getTargetScore(): Get winning target by game type
       - getScoreBounds(): Score limits for current game type
       - parseScoreValue(): Validate score input (7/9 Ejbar)
       - parseShelemScoreValue(): Validate Shelem score input
       - enforceForcedBidIfNeeded(), enablePills(): Game utilities
       - Shelem mode: selectSuit(), resetSuit(), toggleMinus(), updateMinusBtnState()

    5. SCORE PICKER COMPONENT (1622-1895)
       - Picker constants (PICKER_ITEM_H, PICKER_VISIBLE, etc.)
       - pickerValueToOffset(), pickerOffsetToValue(): Value conversion
       - getAllowedPickerValues(), buildPickerItems(): Picker data
       - updatePickerHighlight(): Visual selection
       - initPicker(): Main picker initialization with nested event handlers
       - picker1, picker2: Global picker instances
       - setPickersEnabled(): Enable/disable pickers
       - Input sync: syncDirectInputsFromHidden(), syncHiddenInputsFromDirect()
       - updateScoreInputMode(): Switch picker/direct input based on game type
       - clearDirectInputs(), initVirtualKeyboard(): Input control

    6. CORE GAMEPLAY (1897-2060)
       - selectGameType(): Choose 7/9 Ejbar or Shelem
       - startGame(): Initialize game session
       - updateTeamNames(): Update displayed team names
       - addScore(): Main score submission logic
       - adjustScore(): Increment/decrement score buttons

    7. UI RENDERING & DISPLAY (2062-2230)
       - updateUI(): Main rendering function - displays scores, history, highlights
       - escapeHtml(): HTML escape utility
       - checkWinner(): Determine if game is won
       - showWinner(), closeWinner(): Winner overlay display

    8. HISTORY & ROUND MANAGEMENT (2232-2425)
       - openSheet(), closeSheet(): History edit sheet UI
       - sheetEdit(), sheetDelete(): Sheet action handlers
       - bindLongPress(): Enable long-press to edit rounds
       - deleteRound(): Remove round from history
       - editRound(): Modify round scores
       - newGame(): Reset for new game
       - clearHistory(): Clear all history

    9. THEME, LOCALIZATION & EVENT LISTENERS (2427-2870)
       - applyTheme(), toggleTheme(): Dark/light mode
       - syncSubmitEnabled(): Enable/disable submit button
       - Event listeners: DOMContentLoaded, beforeunload, touchstart/touchmove
       - I18N_UI: Translation strings (English & Farsi)
       - Digit conversion: toFaDigitsUI(), toEnDigitsUI()
       - localizeDisplayedNumbersUI(): Update displayed numbers
       - applyLangUI(): Apply language-specific text/number formats
       - toggleLang(): Switch between English/Farsi

    ============================================================
    */

    // ========== DOM ELEMENT CACHE ==========
    let $ = {};
    
    function initDOMElements() {
      $ = {
        setupScreen: document.getElementById('setupScreen'),
        gameScreen: document.getElementById('gameScreen'),
        team1Name: document.getElementById('team1Name'),
        team2Name: document.getElementById('team2Name'),
        team1Total: document.getElementById('team1Total'),
        team2Total: document.getElementById('team2Total'),
        team1Points: document.getElementById('team1Points'),
        team2Points: document.getElementById('team2Points'),
        team1Card: document.getElementById('team1Card'),
        team2Card: document.getElementById('team2Card'),
        result1: document.getElementById('result1'),
        result2: document.getElementById('result2'),
        directInput1: document.getElementById('directInput1'),
        directInput2: document.getElementById('directInput2'),
        directInputWrap1: document.getElementById('directInputWrap1'),
        directInputWrap2: document.getElementById('directInputWrap2'),
        shelemNote: document.getElementById('shelemNote'),
        submitBtn: document.getElementById('submitBtn'),
        historyList: document.getElementById('historyList'),
        emptyHistory: document.getElementById('emptyHistory'),
        targetHint: document.getElementById('targetHint'),
        winnerOverlay: document.getElementById('winnerOverlay'),
        sheetOverlay: document.getElementById('sheetOverlay'),
        archiveList: document.getElementById('archiveList'),
        emptyArchive: document.getElementById('emptyArchive'),
        archiveTitle: document.getElementById('archiveTitle'),
        archiveHint: document.getElementById('archiveHint'),
        clearArchiveBtn: document.getElementById('clearArchiveBtn'),
        archiveOverlay: document.getElementById('archiveOverlay'),
        archiveOverlayTitle: document.getElementById('archiveOverlayTitle'),
        archiveOverlayMeta: document.getElementById('archiveOverlayMeta'),
        archiveOverlayBody: document.getElementById('archiveOverlayBody'),
        archiveOverlayGameType: document.getElementById('archiveOverlayGameType'),
        archiveSummaryTeam1: document.getElementById('archiveSummaryTeam1'),
        archiveSummaryTeam2: document.getElementById('archiveSummaryTeam2'),
        archiveSummaryScore1: document.getElementById('archiveSummaryScore1'),
        archiveSummaryScore2: document.getElementById('archiveSummaryScore2'),
        archiveSummaryPoints1: document.getElementById('archiveSummaryPoints1'),
        archiveSummaryPoints2: document.getElementById('archiveSummaryPoints2'),
        archiveHistoryCol1: document.getElementById('archiveHistoryCol1'),
        archiveHistoryCol2: document.getElementById('archiveHistoryCol2')
      };
    }

    // ========== GAME STATE ==========
    // Central game state object that tracks everything about the current game:
    // - gameType: 7, 9, or 'shelem' (determines score rules and targets)
    // - team1/team2 Names: User-entered team names
    // - team1/team2 Total: Cumulative score across all rounds
    // - team1/team2 Points: Card points scored in current round (before saving)
    // - history: Array of all completed rounds [{team, points, turn}, ...]
    // - winner: null until target score is reached
    // - lastTurn: Tracks whose turn it was (1 or 2) for alternation
    let gameState = {
      lastTurn: 1,
      gameType: null,
      team1Name: 'Ma',
      team2Name: 'Shoma',
      team1Total: 0,
      team2Total: 0,
      team1Points: 0,
      team2Points: 0,
      history: [],
      winner: null
    };

    // ========== CONSTANTS ==========
    // Game winning targets - must reach this score to win
    // 7 Ejbar: 350 points (traditional Ejbar game with lower target)
    // 9 Ejbar: 550 points (extended Ejbar with higher target and score range)
    // Shelem: 1200 points (special game mode with different scoring rules, no minimum bid)
    const TARGET_6Ejbar = 350;
    const TARGET_7Ejbar = 350;
    const TARGET_8Ejbar = 550;
    const TARGET_9Ejbar = 550;
    const TARGET_shelem = 1200;
    let sheetIndex = null;
    let prevTurnOutlined = null;
    let pressTimer = null;
    let activeScoreInput = null;
    let vkInitialized = false;

    const STORAGE_KEY = 'ejbarGameStateV3';
    const ARCHIVE_KEY = 'ejbarGameArchiveV1';

    // ========== HAPTIC FEEDBACK ==========
    const Haptic = {
      light:   () => navigator.vibrate?.(4),
      medium:  () => navigator.vibrate?.(10),
      heavy:   () => navigator.vibrate?.(25),
      success: () => navigator.vibrate?.([10, 60, 15]),
      error:   () => navigator.vibrate?.([30, 40, 30]),
      warning: () => navigator.vibrate?.(20),
    };

    function saveGameState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
      } catch (e) {
        // Storage unavailable
      }
    }

    function loadGameState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return;
        gameState = Object.assign(gameState, parsed);
      } catch (e) {
        console.warn('Could not load game state', e);
        return;
      }

      if ($.team1Name) $.team1Name.value = gameState.team1Name || 'Ma';
      if ($.team2Name) $.team2Name.value = gameState.team2Name || 'Shoma';

      updateTeamNames();

      if (gameState.gameType) {
        if ($.setupScreen) $.setupScreen.classList.add('hidden');
        if ($.gameScreen) $.gameScreen.classList.remove('hidden');
        const t = I18N_UI[currentLangUI];
        if ($.targetHint) $.targetHint.textContent = t.target(getTargetScore());
      }

      updateUI();
    }

    function getArchive() {
      try {
        const raw = localStorage.getItem(ARCHIVE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveArchive(items) {
      try {
        localStorage.setItem(ARCHIVE_KEY, JSON.stringify(items));
      } catch (e) {
        // Storage unavailable
      }
    }

    function getGameTypeLabel(type) {
      if (type === 'shelem') return 'Shelem';
      if (type === 6 || type === '6') return '6 Ejbar';
      if (type === 7 || type === '7') return '7 Ejbar';
      if (type === 8 || type === '8') return '8 Ejbar';
      if (type === 9 || type === '9') return '9 Ejbar';
      return 'Ejbar';
    }

    function archiveCurrentGame() {
      if (!gameState.history || !gameState.history.length) return;
      if (gameState.archivedAt) return;

      const archive = getArchive();
      const winnerName = gameState.winner || (
        gameState.team1Total === gameState.team2Total
          ? (currentLangUI === 'fa' ? 'مساوی' : 'Draw')
          : (gameState.team1Total > gameState.team2Total ? gameState.team1Name : gameState.team2Name)
      );

      const item = {
        id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
        gameType: gameState.gameType,
        team1Name: gameState.team1Name,
        team2Name: gameState.team2Name,
        team1Total: gameState.team1Total,
        team2Total: gameState.team2Total,
        team1Points: gameState.team1Points,
        team2Points: gameState.team2Points,
        winner: winnerName,
        rounds: gameState.history.length,
        finishedAt: new Date().toISOString(),
        history: JSON.parse(JSON.stringify(gameState.history || []))
      };

      archive.unshift(item);
      saveArchive(archive.slice(0, 50));
      gameState.archivedAt = item.finishedAt;
      saveGameState();
      renderArchive();
    }

    function formatArchiveDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString(currentLangUI === 'fa' ? 'fa-IR' : 'en-US', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch (e) {
        return iso || '';
      }
    }

    function renderArchive() {
      if (!$.archiveList || !$.emptyArchive) return;
      const items = getArchive();

      $.archiveList.innerHTML = '';
      $.archiveList.classList.toggle('hidden', items.length === 0);
      $.emptyArchive.classList.toggle('hidden', items.length > 0);
      $.emptyArchive.textContent = currentLangUI === 'fa' ? 'هنوز بازی ذخیره‌شده‌ای نیست' : 'No saved games yet';

      items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'archive-item';
        const isShelem = item.gameType === 'shelem';
        const gameLabel = getGameTypeLabel(item.gameType);
        const pointsLine = isShelem
          ? ''
          : `<div>${currentLangUI === 'fa' ? 'پوینت:' : 'Points:'} ${item.team1Points} - ${item.team2Points}</div>`;

        el.innerHTML = `
          <div class="archive-top">
            <div class="archive-game">${gameLabel}</div>
            <div class="archive-date">${formatArchiveDate(item.finishedAt)}</div>
          </div>
          <div class="archive-winner">${item.winner}</div>
          <div class="archive-meta">
            <div>${item.team1Name}: ${item.team1Total}</div>
            <div>${item.team2Name}: ${item.team2Total}</div>
            <div>${currentLangUI === 'fa' ? 'دست‌ها:' : 'Rounds:'} ${item.rounds}</div>
            ${pointsLine || '<div></div>'}
          </div>
        `;
        el.addEventListener('click', () => openArchiveDetails(item.id));
        $.archiveList.appendChild(el);
      });

      if (currentLangUI === 'fa') localizeDisplayedNumbersUI();
    }

    function clearArchive() {
      const msg = currentLangUI === 'fa' ? 'همه بازی‌های ذخیره‌شده پاک شوند؟' : 'Clear all saved games?';
      if (!confirm(msg)) return;
      saveArchive([]);
      renderArchive();
    }

    function formatSignedScore(score) {
      return score > 0 ? `+${score}` : String(score);
    }

    function openArchiveDetails(id) {
      const item = getArchive().find(x => x.id === id);
      if (!item || !$.archiveOverlay || !$.archiveOverlayBody) return;

      const isShelem = item.gameType === 'shelem';
      const gameLabel = getGameTypeLabel(item.gameType);

      if ($.archiveOverlayGameType) $.archiveOverlayGameType.textContent = gameLabel;
      if ($.archiveOverlayTitle) $.archiveOverlayTitle.textContent = currentLangUI === 'fa' ? 'تاریخچه' : 'History';
      if ($.archiveOverlayMeta) {
        $.archiveOverlayMeta.textContent =
          `${item.team1Name} vs ${item.team2Name} • ` +
          `${currentLangUI === 'fa' ? 'برنده' : 'Winner'}: ${item.winner} • ` +
          `${formatArchiveDate(item.finishedAt)}`;
      }

      if ($.archiveSummaryTeam1) $.archiveSummaryTeam1.textContent = item.team1Name;
      if ($.archiveSummaryTeam2) $.archiveSummaryTeam2.textContent = item.team2Name;
      if ($.archiveSummaryScore1) $.archiveSummaryScore1.textContent = item.team1Total;
      if ($.archiveSummaryScore2) $.archiveSummaryScore2.textContent = item.team2Total;
      if ($.archiveHistoryCol1) $.archiveHistoryCol1.textContent = item.team1Name;
      if ($.archiveHistoryCol2) $.archiveHistoryCol2.textContent = item.team2Name;
      const roundsHint = document.getElementById('archiveRoundsHint');
      if (roundsHint) roundsHint.textContent = currentLangUI === 'fa' ? 'آخرین دست‌ها در بالا' : 'Most recent first';

      if ($.archiveSummaryPoints1 && $.archiveSummaryPoints2) {
        $.archiveSummaryPoints1.textContent = item.team1Points ?? 0;
        $.archiveSummaryPoints2.textContent = item.team2Points ?? 0;
        $.archiveSummaryPoints1.classList.toggle('hidden', isShelem);
        $.archiveSummaryPoints2.classList.toggle('hidden', isShelem);
      }

      const getShelemRoundClass = (score) => {
        if (score >= 800) return 'shelem-gold';
        if (score >= 400) return 'shelem-green';
        if (score <= -300) return 'shelem-red';
        return '';
      };

      let running1 = 0;
      let running2 = 0;
      const rows = item.history || [];

      $.archiveOverlayBody.innerHTML = rows.map((round, index) => {
        const eff1 = round.effective1 !== undefined ? round.effective1 : round.score1;
        const eff2 = round.effective2 !== undefined ? round.effective2 : round.score2;
        running1 += eff1;
        running2 += eff2;

        const c1 = isShelem ? getShelemRoundClass(eff1) : ((round.points1 || 0) > 0 ? 'milestone' : '');
        const c2 = isShelem ? getShelemRoundClass(eff2) : ((round.points2 || 0) > 0 ? 'milestone' : '');

        const line1 = currentLangUI === 'fa' ? `جمع: ${running1}` : `Total: ${running1}`;
        const line2 = currentLangUI === 'fa' ? `جمع: ${running2}` : `Total: ${running2}`;
        const sub1 = isShelem
          ? (currentLangUI === 'fa' ? `همین دور: ${eff1}` : `This round: ${eff1}`)
          : (currentLangUI === 'fa'
              ? `موثر: ${eff1}${round.points1 ? ` • پوینت +${round.points1}` : ''}`
              : `Effective: ${eff1}${round.points1 ? ` • Point +${round.points1}` : ''}`);
        const sub2 = isShelem
          ? (currentLangUI === 'fa' ? `همین دور: ${eff2}` : `This round: ${eff2}`)
          : (currentLangUI === 'fa'
              ? `موثر: ${eff2}${round.points2 ? ` • پوینت +${round.points2}` : ''}`
              : `Effective: ${eff2}${round.points2 ? ` • Point +${round.points2}` : ''}`);

        const score1 = eff1 > 0 ? `+${eff1}` : `${eff1}`;
        const score2 = eff2 > 0 ? `+${eff2}` : `${eff2}`;

        return `
          <div class="archive-history-row">
            <div class="archive-history-card ${c1}">
              <div class="line">${line1}</div>
              <div class="delta">${score1}</div>
              <div class="sub">${sub1}</div>
              <div class="roundtag">${currentLangUI === 'fa' ? 'دور' : 'Round'} ${index + 1}</div>
            </div>
            <div class="archive-history-card ${c2}">
              <div class="line">${line2}</div>
              <div class="delta">${score2}</div>
              <div class="sub">${sub2}</div>
              <div class="roundtag">${currentLangUI === 'fa' ? 'دور' : 'Round'} ${index + 1}</div>
            </div>
          </div>`;
      }).reverse().join('');

      if (!rows.length) {
        $.archiveOverlayBody.innerHTML = `<div class="archive-history-card">${currentLangUI === 'fa' ? 'جزئیاتی برای این بازی ذخیره نشده.' : 'No details saved for this game.'}</div>`;
      }

      if (currentLangUI === 'fa') localizeDisplayedNumbersUI();
      $.archiveOverlay.classList.add('show');
    }

    function closeArchiveDetails() {
      if ($.archiveOverlay) $.archiveOverlay.classList.remove('show');
    }

    // ========== HELPER FUNCTIONS & THEME MANAGEMENT ==========
    // Theme toggle and initialization on load

    function applyTheme(theme) {
      const html = document.documentElement;
      html.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#000000' : '#F2F2F7');
      const moonEl = document.getElementById('themeLottieMoon');
      const sunEl  = document.getElementById('themeLottieSun');
      if (moonEl && sunEl) {
        if (theme === 'dark') {
          moonEl.style.opacity = '1';
          sunEl.style.opacity  = '0';
          if (window.moonLottieAnim) window.moonLottieAnim.goToAndPlay(0, true);
        } else {
          sunEl.style.opacity  = '1';
          moonEl.style.opacity = '0';
          if (window.sunLottieAnim) window.sunLottieAnim.goToAndPlay(0, true);
        }
      }
    }

    function toggleTheme() {
      Haptic.light();
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') {
        applyTheme(saved);
        return;
      }
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark ? 'dark' : 'light');
    })();

    // ========== GAME RULES & SCORING FUNDAMENTALS ==========
    // Core game logic: target scores, bounds, and score validation
    function getTargetScore() {
      if (gameState.gameType === 'shelem') return TARGET_shelem;
      if (gameState.gameType === 8 || gameState.gameType === 9) return TARGET_9Ejbar;
      return TARGET_7Ejbar;
    }

    // ========== GAME RULES & SCORING FUNDAMENTALS (continued) ==========
    // --- Stub Functions & Utilities ---
    function enforceForcedBidIfNeeded() {
      // no-op in this game mode
    }

    function enablePills(enabled) {
      document.querySelectorAll('.score-btn').forEach(btn => {
        btn.disabled = !enabled;
      });
    }

    // ========== SCORE PICKER COMPONENT ==========
    // Scroll wheel picker: constants, utilities, and initialization
    // The picker is a custom scroll-based input that displays values as a vertical list
    // User scrolls to select a value (-9 to +9 for 7/9 Ejbar, -13 to +13 for 9 Ejbar)
    // This provides a tactile, phone-friendly alternative to typing numbers

    // --- Picker Configuration & Constants ---

    const PICKER_ITEM_H = 50;
    const PICKER_VISIBLE = 3; // show 3 items (top, selected, bottom)
    const PICKER_PAD = 1; // 1 blank slot top & bottom for centering
    const PICKER_MIN = -13;
    const PICKER_MAX = 13;
    const PICKER_COUNT = PICKER_MAX - PICKER_MIN + 1; // 27 items

    function getScoreBounds() {
      if (gameState.gameType === 'shelem') return { min: -9999, max: 9999, absMin: 0, defaultValue: 0 };
      if (gameState.gameType === 8 || gameState.gameType === 9) return { min: -13, max: 13, absMin: 4, defaultValue: 0 };
      return { min: -9, max: 9, absMin: 3, defaultValue: 0 };
    }

    function parseScoreValue(raw) {
      const s = (raw ?? '').toString().trim();
      if (s === '' || s === '-') return null;
      if (!/^-?\d+$/.test(s)) return null;
      const n = parseInt(s, 10);
      const bounds = getScoreBounds();
      if (isNaN(n) || n < bounds.min || n > bounds.max) return null;
      if (gameState.gameType !== 'shelem') {
        if (n === 0) return 0;
        if (n > 0 && n < bounds.absMin) return null;
        if (n < 0 && Math.abs(n) < bounds.absMin) return null;
      }
      return n;
    }

    function parseShelemScoreValue(raw) {
      const s = toEnDigitsUI((raw ?? '').toString()).trim();
      if (s === '') return null;
      if (!/^-?\d+$/.test(s)) return null;
      const n = parseInt(s, 10);
      if (isNaN(n)) return null;
      if (n !== 0 && n % 5 !== 0) return null;
      return n;
    }

    // --- Shelem Game Mode ---
    // Shelem is a special game variant with different scoring rules:
    // - No minimum bid requirement (can bid 0 points)
    // - Scores must be multiples of 5
    // - Has suit selection (♠, ♥, ♦, ♣) as part of game rules
    // - Uses direct numerical input instead of scroll picker

    let selectedSuit = null;
    // Tracks which suit is selected in Shelem mode (used for display/reference)
    // Can be: '♠', '♥', '♦', '♣', or null if not selected
    function selectSuit(suit) {
      selectedSuit = (selectedSuit === suit) ? null : suit;
      document.querySelectorAll('.suit-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.textContent === selectedSuit);
      });
      Haptic.light();
    }

    function resetSuit() {
      selectedSuit = null;
      document.querySelectorAll('.suit-btn').forEach(btn => btn.classList.remove('selected'));
    }

    function updateMinusBtnState(n) {
      const input = document.getElementById(`directInput${n}`);
      const btn = document.getElementById(`minusBtn${n}`);
      if (!btn) return;
      const isNeg = input && input.value.trimStart().startsWith('-');
      btn.classList.toggle('active', !!isNeg);
    }

    function toggleMinus(n) {
      const input = document.getElementById(`directInput${n}`);
      if (!input) return;
      const val = input.value;
      if (val.trimStart().startsWith('-')) {
        input.value = val.replace(/^\s*-/, '');
      } else {
        input.value = val ? `-${val}` : '-';
      }
      updateMinusBtnState(n);
      syncSubmitEnabled();
    }

    function pickerValueToOffset(val) {
      const idx = val - PICKER_MIN; // 0-based index
      return -(idx * PICKER_ITEM_H);
    }

    function pickerOffsetToValue(offset) {
      const idx = Math.round(-offset / PICKER_ITEM_H);
      return Math.max(PICKER_MIN, Math.min(PICKER_MAX, idx + PICKER_MIN));
    }

    function getAllowedPickerValues() {
      const bounds = getScoreBounds();
      if (gameState.gameType === 'shelem') {
        const vals = [];
        for (let v = PICKER_MIN; v <= PICKER_MAX; v++) vals.push(v);
        return vals;
      }
      const vals = [];
      for (let v = bounds.min; v <= -bounds.absMin; v++) vals.push(v);
      vals.push(0);
      for (let v = bounds.absMin; v <= bounds.max; v++) vals.push(v);
      return vals;
    }

    function buildPickerItems(scrollEl) {
      const values = getAllowedPickerValues();
      let html = '';
      for (const v of values) {
        html += `<div class="picker-item" data-value="${v}">${v > 0 ? '' + v : v}</div>`;
      }
      scrollEl.innerHTML = html;
    }

    function updatePickerHighlight(scrollEl, currentValue) {
      scrollEl.querySelectorAll('.picker-item').forEach(item => {
        const v = parseInt(item.getAttribute('data-value'), 10);
        item.classList.toggle('selected', v === currentValue);
      });
    }

    function initPicker(scrollEl, hiddenInput) {
      const state = {
        index: 0,
        visualIndex: 0,
        startY: 0,
        startIndex: 0,
        dragging: false,
        velocity: 0,
        lastY: 0,
        lastTime: 0,
        lastHapticIndex: 0
      };

      function getValues() {
        return getAllowedPickerValues();
      }

      function rebuild() {
        buildPickerItems(scrollEl);
      }

      function clampIndex(i) {
        const values = getValues();
        return Math.max(0, Math.min(values.length - 1, i));
      }

      function findClosestIndex(val) {
        const values = getValues();
        let bestIndex = 0;
        let bestDist = Infinity;
        values.forEach((v, i) => {
          const dist = Math.abs(v - val);
          if (dist < bestDist) {
            bestDist = dist;
            bestIndex = i;
          }
        });
        return bestIndex;
      }

      function renderAtVisualIndex(extraOffset = 0) {
        const values = getValues();
        const nearestIndex = clampIndex(Math.round(state.visualIndex));
        const value = values[nearestIndex] ?? 0;
        const offset = -(state.visualIndex * PICKER_ITEM_H);
        scrollEl.style.transform = `translateY(${offset + PICKER_ITEM_H + extraOffset}px)`;
        hiddenInput.value = String(value);
        updatePickerHighlight(scrollEl, value);
      }

      function applyIndex(i, animated = false, extraOffset = 0) {
        rebuild();
        state.index = clampIndex(i);
        state.visualIndex = state.index;
        if (animated) scrollEl.classList.add('snapping');
        else scrollEl.classList.remove('snapping');
        renderAtVisualIndex(extraOffset);
        if (animated) setTimeout(() => scrollEl.classList.remove('snapping'), 340);
      }

      function getY(e) {
        if (e.touches && e.touches.length) return e.touches[0].clientY;
        return e.clientY;
      }

      function onStart(e) {
        if (gameState.gameType === 'shelem') return;
        scrollEl.classList.remove('snapping');
        if (scrollEl.parentElement) scrollEl.parentElement.classList.add('is-dragging');
        state.dragging = true;
        state.startY = getY(e);
        state.startIndex = state.visualIndex;
        state.lastY = state.startY;
        state.lastTime = Date.now();
        state.velocity = 0;
        state.lastHapticIndex = Math.round(state.visualIndex);
      }

      function onMove(e) {
        if (!state.dragging) return;
        e.preventDefault();
        const y = getY(e);
        const delta = y - state.startY;
        state.visualIndex = clampIndex(state.startIndex - (delta / PICKER_ITEM_H));

        const nearestNow = Math.round(state.visualIndex);
        if (nearestNow !== state.lastHapticIndex) {
          state.lastHapticIndex = nearestNow;
          Haptic.light();
        }

        const now = Date.now();
        const dt = now - state.lastTime;
        if (dt > 0) state.velocity = (y - state.lastY) / dt;
        state.lastY = y;
        state.lastTime = now;

        renderAtVisualIndex(0);
        syncSubmitEnabled();
      }

      function onEnd() {
        if (!state.dragging) return;
        state.dragging = false;
        if (scrollEl.parentElement) scrollEl.parentElement.classList.remove('is-dragging');

        const momentumSteps = Math.round((-state.velocity * 120) / PICKER_ITEM_H);
        const finalIndex = clampIndex(Math.round(state.visualIndex) + momentumSteps);
        state.index = finalIndex;
        state.visualIndex = finalIndex;

        Haptic.light();
        const bounce = Math.max(-8, Math.min(8, -state.velocity * 14));
        applyIndex(finalIndex, true, bounce);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => applyIndex(finalIndex, true, 0));
        });
        syncSubmitEnabled();
      }

      scrollEl.parentElement.addEventListener('touchstart', onStart, { passive: true });
      scrollEl.parentElement.addEventListener('touchmove', onMove, { passive: false });
      scrollEl.parentElement.addEventListener('touchend', onEnd, { passive: true });

      scrollEl.parentElement.addEventListener('mousedown', (e) => {
        e.preventDefault();
        onStart(e);
        const moveHandler = (ev) => onMove(ev);
        const upHandler = () => {
          onEnd();
          document.removeEventListener('mousemove', moveHandler);
          document.removeEventListener('mouseup', upHandler);
        };
        document.addEventListener('mousemove', moveHandler);
        document.addEventListener('mouseup', upHandler);
      });

      scrollEl.parentElement.addEventListener('wheel', (e) => {
        if (gameState.gameType === 'shelem') return;
        e.preventDefault();
        state.index = clampIndex(state.index + (e.deltaY > 0 ? 1 : -1));
        Haptic.light();
        applyIndex(state.index, true);
        syncSubmitEnabled();
      }, { passive: false });

      applyIndex(findClosestIndex(getScoreBounds().defaultValue), false);

      return {
        setValue(val) {
          applyIndex(findClosestIndex(parseInt(val, 10) || getScoreBounds().defaultValue), true);
        },
        getValue() {
          const values = getValues();
          return values[state.index] ?? 0;
        },
        refresh() {
          applyIndex(findClosestIndex(parseInt(hiddenInput.value, 10) || getScoreBounds().defaultValue), false);
        }
      };
    }

    let picker1 = null;
    let picker2 = null;

    // --- Picker Control Functions ---

    function setPickersEnabled(enabled) {
      const pw1 = document.getElementById('pickerWrap1');
      const pw2 = document.getElementById('pickerWrap2');
      if (pw1) { pw1.style.pointerEvents = enabled ? '' : 'none'; pw1.style.opacity = enabled ? '' : '0.4'; }
      if (pw2) { pw2.style.pointerEvents = enabled ? '' : 'none'; pw2.style.opacity = enabled ? '' : '0.4'; }
    }

    // --- Score Input Synchronization ---

    function syncDirectInputsFromHidden() {
      if (gameState.gameType === 'shelem') {
        if ($.directInput1 && $.directInput1.value === '0') $.directInput1.value = '';
        if ($.directInput2 && $.directInput2.value === '0') $.directInput2.value = '';
        return;
      }
      if ($.directInput1) $.directInput1.value = $.result1 ? $.result1.value : '';
      if ($.directInput2) $.directInput2.value = $.result2 ? $.result2.value : '';
    }

    function syncHiddenInputsFromDirect() {
      if (gameState.gameType === 'shelem') {
        const raw1 = toEnDigitsUI($.directInput1?.value || '').trim();
        const raw2 = toEnDigitsUI($.directInput2?.value || '').trim();
        const n1 = parseShelemScoreValue(raw1);
        const n2 = parseShelemScoreValue(raw2);
        if ($.result1) $.result1.value = n1 === null ? '' : String(n1);
        if ($.result2) $.result2.value = n2 === null ? '' : String(n2);
        return;
      }
      if ($.directInput1 && $.result1) $.result1.value = toEnDigitsUI($.directInput1.value || '').trim();
      if ($.directInput2 && $.result2) $.result2.value = toEnDigitsUI($.directInput2.value || '').trim();
    }

    function updateScoreInputMode() {
      const isshelem = gameState.gameType === 'shelem';
      const pw1 = document.getElementById('pickerWrap1');
      const pw2 = document.getElementById('pickerWrap2');
      if (pw1) pw1.classList.toggle('hidden', isshelem);
      if (pw2) pw2.classList.toggle('hidden', isshelem);
      if ($.directInputWrap1) $.directInputWrap1.classList.toggle('hidden', !isshelem);
      if ($.directInputWrap2) $.directInputWrap2.classList.toggle('hidden', !isshelem);
      if ($.shelemNote) $.shelemNote.classList.toggle('hidden', !isshelem);
      const suitRowEl = document.querySelector('.suit-row');
      if (suitRowEl) suitRowEl.classList.toggle('hidden', !isshelem);
      if (!isshelem) resetSuit();

      if (isshelem) {
        if ($.directInput1 && $.directInput1.value === '0') $.directInput1.value = '';
        if ($.directInput2 && $.directInput2.value === '0') $.directInput2.value = '';
      } else {
        syncDirectInputsFromHidden();
      }
    }


    function clearDirectInputs() {
      if ($.directInput1) $.directInput1.value = '';
      if ($.directInput2) $.directInput2.value = '';
    }

    // --- Virtual Keyboard & Picker Initialization ---

    function initVirtualKeyboard() {
      // Initialize scroll pickers instead
      if (vkInitialized) return;
      vkInitialized = true;

      const scroll1 = document.getElementById('pickerScroll1');
      const scroll2 = document.getElementById('pickerScroll2');
      if (!scroll1 || !scroll2 || !$.result1 || !$.result2) return;

      picker1 = initPicker(scroll1, $.result1);
      picker2 = initPicker(scroll2, $.result2);

      // Set initial value to 0
      $.result1.value = '0';
      $.result2.value = '0';
      syncDirectInputsFromHidden();
      updateScoreInputMode();
      syncSubmitEnabled();
    }

    // ========== CORE GAMEPLAY ==========
    // Game flow: type selection, initialization, teams, and scoring

    // --- Game Setup ---

    function toggleEjbarDropdown(event) {
      event.stopPropagation();
      Haptic.light();
      const dropdown = document.getElementById('ejbarDropdown');
      if (!dropdown) return;
      const isOpen = !dropdown.classList.contains('hidden') && !dropdown.classList.contains('closing');
      if (isOpen) {
        closeEjbarDropdown();
      } else {
        dropdown.classList.remove('hidden');
        dropdown.classList.remove('closing');
        document.querySelectorAll('.seg-btn').forEach(btn => btn.classList.remove('selected'));
        const ejbarBtn = document.querySelector('[data-type="ejbar-group"]');
        if (ejbarBtn) ejbarBtn.classList.add('selected');
        setTimeout(() => document.addEventListener('click', closeEjbarDropdown, { once: true }), 0);
      }
    }

    function closeEjbarDropdown() {
      const dropdown = document.getElementById('ejbarDropdown');
      if (!dropdown || dropdown.classList.contains('hidden') || dropdown.classList.contains('closing')) return;
      dropdown.classList.add('closing');
      dropdown.addEventListener('animationend', () => {
        dropdown.classList.add('hidden');
        dropdown.classList.remove('closing');
      }, { once: true });
    }

    function selectGameType(type) {
      Haptic.light();
      gameState.gameType = type;
      closeEjbarDropdown();
      document.querySelectorAll('.seg-btn').forEach(btn => btn.classList.remove('selected'));
      document.querySelectorAll('.ejbar-opt').forEach(btn => btn.classList.remove('selected'));
      if (type === 'shelem') {
        const sel = document.querySelector('[data-type="shelem"]');
        if (sel) sel.classList.add('selected');
        const ejbarMainBtn = document.getElementById('ejbarMainBtn');
        const t0 = I18N_UI[currentLangUI];
        if (ejbarMainBtn) ejbarMainBtn.textContent = t0.labels.ejbar;
      } else {
        const ejbarBtn = document.querySelector('[data-type="ejbar-group"]');
        if (ejbarBtn) ejbarBtn.classList.add('selected');
        const opt = document.querySelector(`.ejbar-opt[data-subtype="${type}"]`);
        if (opt) opt.classList.add('selected');
        const ejbarMainBtn = document.getElementById('ejbarMainBtn');
        if (ejbarMainBtn) {
          ejbarMainBtn.textContent = getGameTypeLabel(type);
          ejbarMainBtn.classList.remove('btn-pop');
          void ejbarMainBtn.offsetWidth; // force reflow to restart animation
          ejbarMainBtn.classList.add('btn-pop');
          ejbarMainBtn.addEventListener('animationend', () => ejbarMainBtn.classList.remove('btn-pop'), { once: true });
        }
      }
      const t = I18N_UI[currentLangUI];
      if ($.targetHint) $.targetHint.textContent = t.target(getTargetScore());
      updateScoreInputMode();

      if (gameState.gameType !== 'shelem') {
        const defaultVal = getScoreBounds().defaultValue;
        if ($.result1) $.result1.value = String(defaultVal);
        if ($.result2) $.result2.value = String(defaultVal);
        if (picker1) picker1.refresh();
        if (picker2) picker2.refresh();
      }

      syncSubmitEnabled();
      saveGameState();
    }

    function startGame() {
      if (!gameState.gameType) {
        Haptic.error();
        const t = I18N_UI[currentLangUI];
        alert(t.alertSelectGameType);
        return;
      }
      Haptic.medium();

      gameState.team1Name = ($.team1Name && $.team1Name.value) || 'Ma';
      gameState.team2Name = ($.team2Name && $.team2Name.value) || 'Shoma';

      if (gameState.gameType !== 'shelem') {
        const defaultVal = getScoreBounds().defaultValue;
        if ($.result1 && (!$.result1.value || $.result1.value === '0')) $.result1.value = String(defaultVal);
        if ($.result2 && (!$.result2.value || $.result2.value === '0')) $.result2.value = String(defaultVal);
        if (picker1) picker1.refresh();
        if (picker2) picker2.refresh();
      }

      updateTeamNames();
      if ($.setupScreen) $.setupScreen.classList.add('hidden');
      if ($.gameScreen) $.gameScreen.classList.remove('hidden');
      updateUI();
      syncSubmitEnabled();
      saveGameState();
    }

    function updateTeamNames() {
      const t = I18N_UI[currentLangUI];
      const ids = ['displayTeam1Name', 'displayTeam2Name', 'resultLabel1', 'resultLabel2', 'historyColTeam1', 'historyColTeam2'];
      const els = ids.map(id => document.getElementById(id));
      if (els[0]) els[0].textContent = gameState.team1Name.toUpperCase();
      if (els[1]) els[1].textContent = gameState.team2Name.toUpperCase();
      if (els[2]) els[2].textContent = `${gameState.team1Name} ${t.wonWord}`;
      if (els[3]) els[3].textContent = `${gameState.team2Name} ${t.wonWord}`;
      if (els[4]) els[4].textContent = gameState.team1Name;
      if (els[5]) els[5].textContent = gameState.team2Name;
    }

    function addScore() {
      const t = I18N_UI[currentLangUI];

      if (gameState.gameType === 'shelem') {
        const raw1 = toEnDigitsUI(($.directInput1?.value ?? '').trim());
        const raw2 = toEnDigitsUI(($.directInput2?.value ?? '').trim());

        const score1 = parseShelemScoreValue(raw1);
        const score2 = parseShelemScoreValue(raw2);

        if (score1 === null || score2 === null) {
          Haptic.error();
          alert(currentLangUI === 'fa'
            ? 'در شلم امتیازها باید مضربی از ۵ یا صفر باشند.'
            : 'In Shelem, scores must be multiples of 5 or zero.');
          return;
        }

        gameState.team1Total += score1;
        gameState.team2Total += score2;

        if (gameState.team1Total < gameState.team2Total) {
          gameState.lastTurn = 1;
        } else if (gameState.team2Total < gameState.team1Total) {
          gameState.lastTurn = 2;
        }

        Haptic.medium();
        gameState.history.push({ score1, score2, effective1: score1, effective2: score2, points1: 0, points2: 0, suit: selectedSuit });

        clearDirectInputs();
        updateMinusBtnState(1); updateMinusBtnState(2);
        resetSuit();
        if ($.result1) $.result1.value = '';
        if ($.result2) $.result2.value = '';

        updateUI();
        checkWinner();
        saveGameState();
        return;
      }

      const raw1 = ($.result1 && $.result1.value) || '';
      const raw2 = ($.result2 && $.result2.value) || '';
      const score1 = raw1.trim() === '' ? 0 : parseInt(raw1, 10);
      const score2 = raw2.trim() === '' ? 0 : parseInt(raw2, 10);
      const bounds = getScoreBounds();

      if (parseScoreValue(String(score1)) === null || parseScoreValue(String(score2)) === null) {
        Haptic.error();
        if (gameState.gameType === 8 || gameState.gameType === 9) {
          alert(currentLangUI === 'fa' ? 'در این نوع اجبار فقط ۴ تا ۱۳ و منفی ۴ تا منفی ۱۳ مجاز است.' : `In ${gameState.gameType} Ejbar, only 4 to 13 and -4 to -13 are allowed.`);
        } else {
          alert(currentLangUI === 'fa' ? 'در این نوع اجبار فقط ۳ تا ۹ و منفی ۳ تا منفی ۹ مجاز است.' : `In ${gameState.gameType} Ejbar, only 3 to 9 and -3 to -9 are allowed.`);
        }
        return;
      }

      let effective1 = score1;
      let effective2 = score2;
      if (gameState.gameType === 8 || gameState.gameType === 9) {
        if (score1 === 10) effective1 = 20;
        if (score2 === 10) effective2 = 20;
        if (score1 === -10) effective1 = -10;
        if (score2 === -10) effective2 = -10;
      }

      gameState.team1Total += effective1;
      gameState.team2Total += effective2;

      let points1 = 0, points2 = 0;
      if (gameState.gameType === 6) {
        if (score1 > 0 && (score1 === 6 || score1 === 8)) points1 = 1;
        if (score2 > 0 && (score2 === 6 || score2 === 8)) points2 = 1;
      } else if (gameState.gameType === 7) {
        if (score1 > 0 && (score1 === 7 || score1 === 9)) points1 = 1;
        if (score2 > 0 && (score2 === 7 || score2 === 9)) points2 = 1;
      } else if (gameState.gameType === 8) {
        if (score1 > 0 && score1 === 8) points1 = 1;
        if (score2 > 0 && score2 === 8) points2 = 1;
      } else if (gameState.gameType === 9) {
        if (score1 > 0 && score1 === 9) points1 = 1;
        if (score2 > 0 && score2 === 9) points2 = 1;
      }

      gameState.team1Points += points1;
      gameState.team2Points += points2;

      if (gameState.team1Total < gameState.team2Total) {
        gameState.lastTurn = 1;
      } else if (gameState.team2Total < gameState.team1Total) {
        gameState.lastTurn = 2;
      }

      Haptic.medium();
      gameState.history.push({ score1, score2, effective1, effective2, points1, points2, suit: selectedSuit });

      if ($.result1) $.result1.value = '0';
      if ($.result2) $.result2.value = '0';
      clearDirectInputs();
      if (picker1) picker1.setValue(0);
      if (picker2) picker2.setValue(0);
      updateMinusBtnState(1); updateMinusBtnState(2);
      resetSuit();

      updateUI();
      checkWinner();
      saveGameState();
    }

    function adjustScore(team, delta) {
      const input = team === 1 ? $.result1 : $.result2;
      if (!input) return;
      const raw = (input.value || '').trim();
      let value = raw === '' ? 0 : parseInt(raw, 10);
      if (isNaN(value)) value = 0;
      value += delta;
      const bounds = getScoreBounds();
      if (value < bounds.min) value = bounds.min;
      if (value > bounds.max) value = bounds.max;
      input.value = String(value);
      syncSubmitEnabled();
    }


    function updateUI() {
      enforceForcedBidIfNeeded();

      const totalMultiplier = gameState.gameType === 'shelem' ? 1 : 10;
      const newTotal1 = gameState.team1Total * totalMultiplier;
      const newTotal2 = gameState.team2Total * totalMultiplier;
      if ($.team1Total) $.team1Total.textContent = newTotal1;
      if ($.team2Total) $.team2Total.textContent = newTotal2;
      if ($.team1Points) $.team1Points.textContent = gameState.team1Points;
      if ($.team2Points) $.team2Points.textContent = gameState.team2Points;

      if ($.team1Points && $.team2Points) {
        const isShelem = gameState.gameType === 'shelem';
        $.team1Points.classList.toggle('hidden', isShelem);
        $.team2Points.classList.toggle('hidden', isShelem);

        if (isShelem) {
          $.team1Points.classList.remove('points-leading');
          $.team2Points.classList.remove('points-leading');
        } else {
          $.team1Points.classList.toggle('points-leading', gameState.team1Points > gameState.team2Points);
          $.team2Points.classList.toggle('points-leading', gameState.team2Points > gameState.team1Points);
        }
      }

      if ($.team1Card && $.team2Card) {
        $.team1Card.classList.remove('turn-outline', 'turn-pulse', 'total-highlight', 'total-pulse');
        $.team2Card.classList.remove('turn-outline', 'turn-pulse', 'total-highlight', 'total-pulse');

        let currentOutlined = null;

        if (gameState.team1Total < gameState.team2Total) {
          $.team1Card.classList.add('total-highlight', 'total-pulse');
          gameState.lastTurn = 1;
          currentOutlined = 1;
        } else if (gameState.team2Total < gameState.team1Total) {
          $.team2Card.classList.add('total-highlight', 'total-pulse');
          gameState.lastTurn = 2;
          currentOutlined = 2;
        } else if (gameState.lastTurn === 1) {
          $.team1Card.classList.add('total-highlight', 'total-pulse');
          currentOutlined = 1;
        } else if (gameState.lastTurn === 2) {
          $.team2Card.classList.add('total-highlight', 'total-pulse');
          currentOutlined = 2;
        }

        if (currentOutlined && currentOutlined !== prevTurnOutlined) {
          const target = currentOutlined === 1 ? $.team1Card : $.team2Card;
          target.classList.add('turn-pulse');
          setTimeout(() => target.classList.remove('turn-pulse'), 600);
        }
        prevTurnOutlined = currentOutlined;
      }

      if (!$.historyList || !$.emptyHistory) return;

      if (gameState.history.length === 0) {
        $.emptyHistory.classList.remove('hidden');
        $.historyList.classList.add('hidden');
        $.historyList.innerHTML = '';
        return;
      }

      $.emptyHistory.classList.add('hidden');
      $.historyList.classList.remove('hidden');

      const t = I18N_UI[currentLangUI];
      const getScoreClass = (score) => score > 0 ? 'win' : (score < 0 ? 'lose' : '');
      const formatScore = (score) => score > 0 ? `+${score}` : String(score);
      const getShelemHistoryClass = (score) => {
        if (score >= 800) return 'shelem-gold';
        if (score >= 400) return 'shelem-green';
        if (score <= -300) return 'shelem-red';
        return '';
      };
      let running1 = 0, running2 = 0;

      const rows = gameState.history.map((round, index) => {
        const eff1 = round.effective1 !== undefined ? round.effective1 : round.score1;
        const eff2 = round.effective2 !== undefined ? round.effective2 : round.score2;
        running1 += eff1;
        running2 += eff2;
        const totalMultiplier = gameState.gameType === 'shelem' ? 1 : 10;
        const total1 = running1 * totalMultiplier;
        const total2 = running2 * totalMultiplier;
        const suitTag = round.suit ? ` <span style="font-size:16px;vertical-align:-1px;">${round.suit}</span>` : '';
        const roundLabel1 = currentLangUI === 'fa' ? `دست ${index + 1}: ${total1}${suitTag}` : `R${index + 1}: ${total1}${suitTag}`;
        const roundLabel2 = currentLangUI === 'fa' ? `دست ${index + 1}: ${total2}${suitTag}` : `R${index + 1}: ${total2}${suitTag}`;
        const score1 = `<div class="delta ${getScoreClass(eff1)}">${formatScore(eff1)}</div>`;
        const score2 = `<div class="delta ${getScoreClass(eff2)}">${formatScore(eff2)}</div>`;
        const team1Class = gameState.gameType === 'shelem' ? getShelemHistoryClass(eff1) : (round.points1 > 0 ? 'milestone' : '');
        const team2Class = gameState.gameType === 'shelem' ? getShelemHistoryClass(eff2) : (round.points2 > 0 ? 'milestone' : '');

        return `<div class="row">
            <div class="mini ${team1Class}">
              ${score1}
              <div class="line">${roundLabel1}</div>
            </div>
            <div class="mini ${team2Class}">
              ${score2}
              <div class="line">${roundLabel2}</div>
            </div>
          </div>`;
      }).reverse().join('');

      $.historyList.innerHTML = rows;
      bindLongPress();
    }

    const escapeHtmlMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, ch => escapeHtmlMap[ch]);
    }

    function checkWinner() {
      const t = I18N_UI[currentLangUI];
      const targetScore = getTargetScore();
      if (gameState.gameType === 'shelem') {
        if (gameState.team1Total >= targetScore || gameState.team2Total >= targetScore) {
          const winner = gameState.team1Total >= targetScore && gameState.team1Total >= gameState.team2Total ? gameState.team1Name : gameState.team2Name;
          const winnerScore = Math.max(gameState.team1Total, gameState.team2Total);
          showWinner(winner, t.winnerScoreSimple(winnerScore));
        }
        return;
      }

      const pointsDiff = Math.abs(gameState.team1Points - gameState.team2Points);

      if ((gameState.team1Total >= targetScore || gameState.team2Total >= targetScore) && pointsDiff >= 1) {
        const winner = gameState.team1Points > gameState.team2Points ? gameState.team1Name : gameState.team2Name;
        const winnerScore = Math.max(gameState.team1Total, gameState.team2Total);
        const winnerPoints = Math.max(gameState.team1Points, gameState.team2Points);
        showWinner(winner, t.winnerScore(winnerScore, winnerPoints));
      }
    }

    function showWinner(name, message) {
      Haptic.success();
      gameState.winner = name;
      const winnerNameEl = document.getElementById('winnerName');
      const winnerMessageEl = document.getElementById('winnerMessage');
      if (winnerNameEl) winnerNameEl.textContent = name;
      if (winnerMessageEl) {
        winnerMessageEl.textContent = message;
        if (currentLangUI === "fa") {
          localizeDisplayedNumbersUI();
        }
      }
      if ($.winnerOverlay) $.winnerOverlay.classList.add('show');
      if ($.result1) $.result1.disabled = true;
      if ($.result2) $.result2.disabled = true;
      setPickersEnabled(false);
      enablePills(false);
      archiveCurrentGame();
    }

    function closeWinner() {
      Haptic.light();
      if ($.winnerOverlay) $.winnerOverlay.classList.remove('show');
    }

    // ========== HISTORY & ROUND MANAGEMENT ==========
    // Round editing/deletion, game history, and reset

    // --- History View & Interaction ---

    function openSheet(idx) {
      Haptic.heavy();
      sheetIndex = idx;
      if ($.sheetOverlay) $.sheetOverlay.classList.add('show');
    }

    function closeSheet() {
      if ($.sheetOverlay) $.sheetOverlay.classList.remove('show');
      sheetIndex = null;
    }

    function sheetEdit() {
      if (sheetIndex !== null) editRound(sheetIndex);
      closeSheet();
    }

    function sheetDelete() {
      if (sheetIndex !== null) deleteRound(sheetIndex);
      closeSheet();
    }

    function bindLongPress() {
      const rows = $.historyList?.querySelectorAll('.row');
      if (!rows) return;
      rows.forEach((row, idx) => {
        let moved = false;
        const startTimer = () => { moved = false; pressTimer = setTimeout(() => openSheet(idx), 420); };
        const cancelTimer = () => { moved = true; clearTimeout(pressTimer); };
        const endTimer = () => clearTimeout(pressTimer);
        row.addEventListener('touchstart', startTimer, { passive: true });
        row.addEventListener('touchmove', cancelTimer, { passive: true });
        row.addEventListener('touchend', endTimer, { passive: true });
      });
    }

    function deleteRound(index) {
      const actualIndex = gameState.history.length - 1 - index;
      const round = gameState.history[actualIndex];
      if (!round) return;

      gameState.team1Total -= (round.effective1 !== undefined ? round.effective1 : round.score1);
      gameState.team2Total -= (round.effective2 !== undefined ? round.effective2 : round.score2);
      gameState.team1Points -= round.points1;
      gameState.team2Points -= round.points2;

      gameState.history.splice(actualIndex, 1);

      gameState.winner = null;
      closeWinner();
      if ($.result1) $.result1.disabled = false;
      if ($.result2) $.result2.disabled = false;
      setPickersEnabled(true);
      enablePills(true);

      updateUI();
      checkWinner();
      saveGameState();
    }

    function editRound(index) {
      const t = I18N_UI[currentLangUI];
      const actualIndex = gameState.history.length - 1 - index;
      const round = gameState.history[actualIndex];
      if (!round) return;

      const team1ScoreInput = prompt(t.promptEditScore(gameState.team1Name), round.score1);
      if (team1ScoreInput === null) return;
      const team2ScoreInput = prompt(t.promptEditScore(gameState.team2Name), round.score2);
      if (team2ScoreInput === null) return;

      const newScore1 = parseInt(team1ScoreInput, 10);
      const newScore2 = parseInt(team2ScoreInput, 10);

      const bounds = getScoreBounds();
      if (isNaN(newScore1) || isNaN(newScore2) || newScore1 < bounds.min || newScore1 > bounds.max || newScore2 < bounds.min || newScore2 > bounds.max) {
        alert(t.alertResultRange(bounds.max));
        return;
      }

      gameState.team1Total -= (round.effective1 !== undefined ? round.effective1 : round.score1);
      gameState.team2Total -= (round.effective2 !== undefined ? round.effective2 : round.score2);
      gameState.team1Points -= round.points1 || 0;
      gameState.team2Points -= round.points2 || 0;

      let newPoints1 = 0, newPoints2 = 0;
      if (gameState.gameType === 6) {
        if (newScore1 > 0 && (newScore1 === 6 || newScore1 === 8)) newPoints1 = 1;
        if (newScore2 > 0 && (newScore2 === 6 || newScore2 === 8)) newPoints2 = 1;
      } else if (gameState.gameType === 7) {
        if (newScore1 > 0 && (newScore1 === 7 || newScore1 === 9)) newPoints1 = 1;
        if (newScore2 > 0 && (newScore2 === 7 || newScore2 === 9)) newPoints2 = 1;
      } else if (gameState.gameType === 8) {
        if (newScore1 > 0 && newScore1 === 8) newPoints1 = 1;
        if (newScore2 > 0 && newScore2 === 8) newPoints2 = 1;
      } else if (gameState.gameType === 9) {
        if (newScore1 > 0 && newScore1 === 9) newPoints1 = 1;
        if (newScore2 > 0 && newScore2 === 9) newPoints2 = 1;
      }

      // Apply 8/9 Ejbar special rule for edited scores too
      let newEffective1 = newScore1;
      let newEffective2 = newScore2;
      if (gameState.gameType === 8 || gameState.gameType === 9) {
        if (newScore1 === 10) newEffective1 = 20;
        if (newScore2 === 10) newEffective2 = 20;
        if (newScore1 === -10) newEffective1 = -10;
        if (newScore2 === -10) newEffective2 = -10;
      }

      gameState.team1Total += newEffective1;
      gameState.team2Total += newEffective2;
      gameState.team1Points += newPoints1;
      gameState.team2Points += newPoints2;

      gameState.history[actualIndex] = {
        score1: newScore1, score2: newScore2,
        effective1: newEffective1, effective2: newEffective2,
        points1: newPoints1, points2: newPoints2
      };

      gameState.winner = null;
      closeWinner();
      if ($.result1) $.result1.disabled = false;
      if ($.result2) $.result2.disabled = false;
      setPickersEnabled(true);
      enablePills(true);

      updateUI();
      checkWinner();
      saveGameState();
    }

    function newGame() {
      const t = I18N_UI[currentLangUI];
      if (!confirm(t.confirmNewGame)) return;
      Haptic.medium();
      archiveCurrentGame();

      gameState = {
        lastTurn: 1,
        gameType: null,
        team1Name: 'Ma',
        team2Name: 'Shoma',
        team1Total: 0,
        team2Total: 0,
        team1Points: 0,
        team2Points: 0,
        history: [],
        winner: null
      };

      if ($.result1) $.result1.disabled = false;
      if ($.result2) $.result2.disabled = false;
      setPickersEnabled(true);
      if (picker1) picker1.setValue(0);
      if (picker2) picker2.setValue(0);
      clearDirectInputs();
      updateMinusBtnState(1); updateMinusBtnState(2);
      resetSuit();

      closeWinner();
      if ($.gameScreen) $.gameScreen.classList.add('hidden');
      if ($.setupScreen) $.setupScreen.classList.remove('hidden');
      document.querySelectorAll('.seg-btn').forEach(btn => btn.classList.remove('selected'));
      document.querySelectorAll('.ejbar-opt').forEach(btn => btn.classList.remove('selected'));
      closeEjbarDropdown();
      const ejbarMainBtnReset = document.getElementById('ejbarMainBtn');
      if (ejbarMainBtnReset) ejbarMainBtnReset.textContent = I18N_UI[currentLangUI].labels.ejbar;

      if ($.team1Name) $.team1Name.value = 'Ma';
      if ($.team2Name) $.team2Name.value = 'Shoma';
      if ($.targetHint) $.targetHint.textContent = 'Target: —';
      updateScoreInputMode();

      updateUI();
      try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    }

    function clearHistory() {
      const t = I18N_UI[currentLangUI];
      if (!confirm(t.confirmClearHistory)) return;
      Haptic.warning();

      gameState.history = [];
      gameState.team1Total = 0;
      gameState.team2Total = 0;
      gameState.team1Points = 0;
      gameState.team2Points = 0;
      gameState.lastTurn = 1;
      prevTurnOutlined = null;
      gameState.winner = null;

      if ($.result1) $.result1.disabled = false;
      if ($.result2) $.result2.disabled = false;
      setPickersEnabled(true);
      if (picker1) picker1.setValue(0);
      if (picker2) picker2.setValue(0);
      clearDirectInputs();
      updateMinusBtnState(1); updateMinusBtnState(2);
      resetSuit();
      enablePills(true);

      closeWinner();
      updateUI();
      saveGameState();
    }

    document.addEventListener('DOMContentLoaded', () => {
      initDOMElements();
      loadGameState();
      renderArchive();
      if (gameState.gameType !== null) {
        document.querySelectorAll('.seg-btn').forEach(btn => btn.classList.remove('selected'));
        document.querySelectorAll('.ejbar-opt').forEach(btn => btn.classList.remove('selected'));
        if (gameState.gameType === 'shelem') {
          const sel = document.querySelector('[data-type="shelem"]');
          if (sel) sel.classList.add('selected');
        } else {
          const ejbarBtn = document.querySelector('[data-type="ejbar-group"]');
          if (ejbarBtn) ejbarBtn.classList.add('selected');
          const opt = document.querySelector(`.ejbar-opt[data-subtype="${gameState.gameType}"]`);
          if (opt) opt.classList.add('selected');
          const ejbarMainBtn = document.getElementById('ejbarMainBtn');
          if (ejbarMainBtn) ejbarMainBtn.textContent = getGameTypeLabel(gameState.gameType);
        }
      }
      initVirtualKeyboard();
      if (gameState.gameType === 'shelem') {
        clearDirectInputs();
        updateMinusBtnState(1); updateMinusBtnState(2);
        if ($.result1) $.result1.value = '';
        if ($.result2) $.result2.value = '';
      } else {
        if (picker1) picker1.refresh();
        if (picker2) picker2.refresh();
      }

      if ($.submitBtn) {
        $.submitBtn.addEventListener('click', () => {
          if ($.submitBtn.disabled) return;
          addScore();
          syncSubmitEnabled();
        });
      }
      if ($.result1) $.result1.addEventListener('input', syncSubmitEnabled);
      if ($.result2) $.result2.addEventListener('input', syncSubmitEnabled);
      if ($.directInput1) $.directInput1.addEventListener('input', () => { syncSubmitEnabled(); updateMinusBtnState(1); });
      if ($.directInput2) $.directInput2.addEventListener('input', () => { syncSubmitEnabled(); updateMinusBtnState(2); });
      updateScoreInputMode();
      syncSubmitEnabled();

      // ---- Theme Lottie init ----
      if (window.lottie) {
        const moonEl = document.getElementById('themeLottieMoon');
        const sunEl  = document.getElementById('themeLottieSun');
        if (moonEl && sunEl) {
          window.moonLottieAnim = lottie.loadAnimation({ container: moonEl, renderer: 'svg', loop: false, autoplay: false, animationData: MOON_LOTTIE_DATA });
          window.sunLottieAnim  = lottie.loadAnimation({ container: sunEl,  renderer: 'svg', loop: false, autoplay: false, animationData: SUN_LOTTIE_DATA  });
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          moonEl.style.opacity = isDark ? '1' : '0';
          sunEl.style.opacity  = isDark ? '0' : '1';
          window.moonLottieAnim.goToAndStop(89, true);
          window.sunLottieAnim.goToAndStop(89, true);
        }
      }
    });
