  <link rel="manifest" href="manifest.webmanifest">

  <style>

    /* ── Reset & Base ──────────────────────────────────────────────────────
       Global box-model reset and body defaults. Vazirmatn is the primary
       font (supports both Latin and Persian). Overscroll is contained so
       the app doesn't bounce on iOS when at the top/bottom of a scroll.
    ─────────────────────────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: "Vazirmatn", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Theme Variables ───────────────────────────────────────────────────
       All design tokens live here. Light-mode values are in :root; dark-mode
       overrides are in [data-theme="dark"]. --radius and --corner-shape
       produce native squircle corners on supporting browsers (Safari 18+).
    ─────────────────────────────────────────────────────────────────────── */
    :root {
      --bg: #F2F2F7;
      --card: rgba(255,255,255,0.72);
      --stroke: rgba(60,60,67,0.18);
      --stroke-strong: rgba(60,60,67,0.28);
      --text: #111111;
      --text-secondary: rgba(60,60,67,0.72);
      --text-tertiary: rgba(60,60,67,0.45);
      --blue: #007AFF;
      --green: #34C759;
      --red: #FF3B30;
      --orange: #FF9500;
      --shadow-1: 0 1px 1px rgba(0,0,0,0.06), 0 6px 18px rgba(0,0,0,0.06);
      --shadow-2: 0 10px 30px rgba(0,0,0,0.10);
      --brm: 1;
      --radius: calc(22px * var(--brm));
      --corner-shape: squircle;
      --blur: blur(24px) saturate(180%);
    }

    @supports (corner-shape: squircle) {
      :root { --brm: 2; }
    }

    [data-theme="dark"] {
      --bg: #000000;
      --card: rgba(28,28,30,0.72);
      --card-solid: #1C1C1E;
      --stroke: rgba(84,84,88,0.65);
      --stroke-strong: rgba(84,84,88,0.80);
      --text: #FFFFFF;
      --text-secondary: rgba(235,235,245,0.72);
      --text-tertiary: rgba(235,235,245,0.45);
      --shadow-1: 0 1px 1px rgba(0,0,0,0.40), 0 10px 26px rgba(0,0,0,0.45);
      --shadow-2: 0 12px 34px rgba(0,0,0,0.55);
    }

    /* ── Layout ────────────────────────────────────────────────────────────
       Centres the app content up to 680 px and respects safe-area insets
       (iPhone notch / home indicator).
    ─────────────────────────────────────────────────────────────────────── */
    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
      min-height: 100%;
    }

    /* ── Nav Bar ───────────────────────────────────────────────────────────
       Sticky frosted-glass header. Bleeds edge-to-edge via negative margins
       and uses a gradient fade at the bottom so content scrolls beneath it
       naturally. .brand holds the app title + subtitle chip; .nav-actions
       holds the lang and theme toggle buttons.
    ─────────────────────────────────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding: calc(env(safe-area-inset-top) + 10px) 14px 18px;
      background: linear-gradient(to bottom, rgba(242,242,247,0.92) 0%, rgba(242,242,247,0.78) 55%, rgba(242,242,247,0.00) 100%);
      backdrop-filter: var(--blur);
    }

    [data-theme="dark"] .nav {
      background: linear-gradient(to bottom, rgba(0,0,0,0.90) 0%, rgba(0,0,0,0.62) 55%, rgba(0,0,0,0.00) 100%);
    }

    .nav::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 22px;
      box-shadow: 0 12px 18px rgba(0,0,0,0.06);
      pointer-events: none;
      opacity: 0.22;
    }

    [data-theme="dark"] .nav::after {
      box-shadow: 0 14px 22px rgba(0,0,0,0.55);
      opacity: 0.35;
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px 2px;
    }

    .title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.6px;
      line-height: 1.1;
    }

    .icon-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 38px;
      padding: 0 12px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.35);
      backdrop-filter: var(--blur);
      user-select: none;
      color: var(--text);
    }

    [data-theme="dark"] .icon-chip { background: rgba(28,28,30,0.55); }

    .icon-chip .emoji { font-size: 18px; }
    .icon-chip .small { font-size: 12px; color: var(--text-secondary); font-weight: 700; }

    .nav-actions { display: flex; align-items: center; gap: 10px; }

    /* ── Icon Buttons ──────────────────────────────────────────────────────
       Squircle icon buttons used in the nav bar for lang and theme toggles.
       .lang-btn reverses its bg/text colors relative to the theme so the
       language icon always reads clearly. .theme-lottie-wrap holds the two
       stacked Lottie containers (moon + sun) that crossfade on toggle.
    ─────────────────────────────────────────────────────────────────────── */
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.35);
      backdrop-filter: var(--blur);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: transform 120ms ease, background 120ms ease;
    }

    [data-theme="dark"] .icon-btn { background: rgba(28,28,30,0.55); }
    .icon-btn:active { transform: scale(0.96); }

    .icon-btn.lang-btn { border: 1px solid var(--stroke); color: #1C1C1E; }
    [data-theme="dark"] .icon-btn.lang-btn { background: rgba(28,28,30,0.55); border-color: var(--stroke); color: #FFFFFF; }
    .icon-btn.lang-btn:active { opacity: 0.8; }

    .theme-lottie-wrap { position: relative; width: 24px; height: 24px; }
    .theme-lottie { position: absolute; inset: 0; transition: opacity 380ms ease; pointer-events: none; }
    .install-lottie { width: 22px; height: 22px; pointer-events: none; flex-shrink: 0; filter: brightness(0) invert(1); }
    .install-cta-btn { display: inline-flex !important; align-items: center; gap: 6px; width: auto !important; height: 40px; padding: 0 16px; font-size: 14px; font-weight: normal; border-radius: var(--radius); white-space: nowrap; justify-content: center; }
    .theme-lottie g { opacity: 1 !important; }
    [data-theme="dark"] .theme-lottie { filter: brightness(0) invert(1); }

    /* ── Section Cards ─────────────────────────────────────────────────────
       Frosted-glass card containers used for each major block of UI
       (game type selector, scoreboard, score input, history).
    ─────────────────────────────────────────────────────────────────────── */
    .section {
      margin: 10px 0 14px;
      padding: 14px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      background: var(--card);
      backdrop-filter: var(--blur);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title h2 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.2px;
    }

    .hint {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-tertiary);
    }

    /* ── Segmented Control ─────────────────────────────────────────────────
       iOS-style pill selector for choosing game type (Ejbar / Shelem).
       .ejbar-btn-wrap is a relative container so the Ejbar sub-type
       dropdown can position itself absolutely below the button.
    ─────────────────────────────────────────────────────────────────────── */
    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(118,118,128,0.12);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      padding: 3px;
      gap: 3px;
      margin: 8px 0 14px;
    }

    [data-theme="dark"] .segmented { background: rgba(118,118,128,0.24); }

    .seg-btn {
      appearance: none;
      border: none;
      background: transparent;
      padding: 10px 12px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
      transition: background 140ms ease, transform 120ms ease;
    }

    .seg-btn.selected {
      background: #0A84FF;
      color: #fff;
    }

    .seg-btn:active { transform: scale(0.985); }

    .segmented-3 {
      grid-template-columns: repeat(3, 1fr);
    }


    .ejbar-btn-wrap {
      position: relative;
    }

    .ejbar-btn-wrap > .seg-btn {
      width: 100%;
      height: 100%;
    }

    /* ── Animations & Transitions ──────────────────────────────────────────
       squircle-in: CSS View Transitions keyframe — new content is clipped to
         a circle that expands outward from the triggering button's position.
       dropdown-in/out: Spring-in open, fade-out close for the Ejbar sub-menu.
       btn-pop: Subtle press feedback on interactive buttons.
       totalPulse/turnPulse: Score card micro-animations on new round.
       pop: Entry animation for the victory overlay card.
       sheetUp: Action sheet slides up from the bottom.
    ─────────────────────────────────────────────────────────────────────── */
    @keyframes squircle-in {
      from { clip-path: circle(0px at var(--squircle-x, 50%) var(--squircle-y, 50%)); }
      to   { clip-path: circle(150vmax at var(--squircle-x, 50%) var(--squircle-y, 50%)); }
    }
    ::view-transition-new(root) {
      animation: squircle-in 820ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    ::view-transition-old(root) {
      animation: none;
    }

    @keyframes dropdown-in {
      from { opacity: 0; transform: translateY(-6px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes dropdown-out {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-6px) scale(0.96); }
    }
    @keyframes btn-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .ejbar-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow-2);
      z-index: 200;
      overflow: hidden;
      transform-origin: top center;
      animation: dropdown-in 220ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .ejbar-dropdown.closing {
      animation: dropdown-out 160ms ease-in forwards;
    }

    .ejbar-opt {
      display: block;
      width: 100%;
      padding: 14px 16px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--stroke);
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      font-family: inherit;
      text-align: center;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .ejbar-opt:last-child { border-bottom: none; }
    .ejbar-opt:active { transform: scale(0.985); background: #0A84FF; color: #fff; }
    .ejbar-opt.selected { background: #0A84FF; color: #fff; }

    .btn-pop {
      animation: btn-pop 200ms ease-in-out forwards;
    }


    /* ── Direct Score Input (Shelem) ───────────────────────────────────────
       Full-width numeric text inputs used in Shelem mode (replaces the scroll
       picker). .minus-btn is an absolute-positioned toggle inside the input
       row that prefixes a minus sign to allow negative Shelem scores.
    ─────────────────────────────────────────────────────────────────────── */
    .direct-score-input {
      width: 100%;
      padding: 14px 12px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.62);
      backdrop-filter: var(--blur);
      color: var(--text);
      font-size: 26px;
      font-weight: 900;
      text-align: center;
      outline: none;
      direction: ltr;
      unicode-bidi: isolate;
    }

    [data-theme="dark"] .direct-score-input { background: rgba(28,28,30,0.58); }

    .direct-score-input:focus {
      outline: none;
      border-color: rgba(0,122,255,0.55);
    }

    .direct-input-row {
      position: relative;
      display: block;
    }

    .direct-input-row .direct-score-input {
      width: 100%;
      padding-left: 54px;
    }

    .minus-btn {
      position: absolute;
      left: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: calc(100% - 14px);
      border-radius: calc(var(--radius) * 0.55);
      corner-shape: var(--corner-shape);
      border: 0px solid var(--stroke);
      background: rgba(118,118,128,0.12);
      color: var(--text-secondary);
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease, transform 120ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      z-index: 1;
    }

    [data-theme="dark"] .minus-btn { background: rgba(118,118,128,0.20); }

    .minus-btn.active {
      background: rgba(255,59,48,0.18);
      border-color: rgba(255,59,48,0.60);
      color: var(--red);
    }

    .minus-btn:active { transform: translateY(-50%) scale(0.93); }

    /* ── Utilities ─────────────────────────────────────────────────────────
       .hidden: Used throughout to show/hide screens and elements via JS.
    ─────────────────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Form Fields ────────────────────────────────────────────────────────
       Team name text inputs on the setup screen.
    ─────────────────────────────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: var(--text-secondary);
      margin: 0 0 6px 2px;
    }

    .text {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.62);
      backdrop-filter: var(--blur);
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }

    [data-theme="dark"] .text { background: rgba(28,28,30,0.58); }

    .text:focus {
      border-color: rgba(0,122,255,0.55);
    }

    /* ── Buttons ────────────────────────────────────────────────────────────
       .btn-primary: Blue CTA (Start Game, Submit).
       .btn-secondary: Muted action (New Game).
       .btn-danger: Destructive action (Clear history) — red tint.
       .is-disabled / :disabled: Greyed-out state with !important overrides
         to prevent color bleed from primary/danger backgrounds.
    ─────────────────────────────────────────────────────────────────────── */
    .btn {
      width: 100%;
      border: none;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      padding: 14px;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: transform 120ms ease;
      user-select: none;
    }

    .btn:active { transform: scale(0.985); }

    .btn-primary {
      background: var(--blue);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(118,118,128,0.16);
      color: var(--text);
      border: 1px solid var(--stroke);
    }

    .btn-danger {
      background: rgba(255,59,48,0.14);
      color: var(--red);
      border: 1px solid rgba(255,59,48,0.25);
    }

    .btn.is-disabled,
    .btn:disabled {
      background: rgba(60,60,67,0.28) !important;
      color: rgba(255,255,255,0.55) !important;
      border-color: rgba(255,255,255,0.10) !important;
      cursor: not-allowed;
    }

    /* ── Score Display ──────────────────────────────────────────────────────
       Two-column grid of score cards shown on the game screen. Each card
       shows the team name, a points badge (game-point tally), and the large
       running total. .total-highlight adds a red border when a team is close
       to or has passed the target. .accent-1/.accent-2 color the totals blue
       and green respectively. .badge.points-leading highlights the leader.
    ─────────────────────────────────────────────────────────────────────── */
    .score-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .score-card {
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      padding: 14px 14px 16px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.55);
      backdrop-filter: var(--blur);
      transition: border-color 220ms ease, background 220ms ease;
    }

    [data-theme="dark"] .score-card { background: rgba(28,28,30,0.58); }

    .score-card.total-highlight {
      border: 1px solid rgba(255,59,48,0.65) !important;
    }

    [data-theme="dark"] .score-card.total-highlight {
      border-color: rgba(255,59,48,0.75) !important;
    }

    .score-top {
      direction: ltr;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      align-items: center;
    }

    .team-label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      line-height: 1.2;
    }

    .badge {
      height: 28px;
      width: 28px;
      min-width: 28px;
      padding: 0;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: rgba(118,118,128,0.16);
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
      display: inline-flex;
      justify-content: center;
      line-height: 28px;
      box-sizing: border-box;
      transition: border-color 220ms ease, background 220ms ease;
    }

    .badge.points-leading {
      background: rgba(255,149,0,0.20) !important;
      border: 1px solid rgba(255,149,0,0.65) !important;
      color: var(--text) !important;
    }

    [data-theme="dark"] .badge.points-leading {
      background: rgba(255,159,10,0.26) !important;
      border-color: rgba(255,159,10,0.72) !important;
    }

    .score-value {
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -1.6px;
      line-height: 1;
      margin-top: 2px;
      direction: ltr;
      unicode-bidi: isolate;
    }

    .accent-1 { color: var(--blue); }
    .accent-2 { color: var(--green); }


    /* ── Result Grid ────────────────────────────────────────────────────────
       Two-column grid that holds the scroll pickers (Ejbar) or direct text
       inputs (Shelem) side-by-side. .num hides the backing <input type=hidden>
       that stores the numeric value for the picker.
    ─────────────────────────────────────────────────────────────────────── */
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .num {
      /* hidden input, no styles needed */
      display: none;
    }

    /* ── Scroll Picker ──────────────────────────────────────────────────────
       iOS-style drum-roll scroll picker used in Ejbar mode. The visible
       window is 150 px tall (3 items at 50 px each). .picker-scroll moves
       via transform:translateY driven by JS touch/mouse events. .snapping
       adds a CSS transition so the scroll settles with spring momentum.
       .picker-highlight is the blue selection band in the centre.
       .picker-fade top/bottom gradients mask items outside the window.
    ─────────────────────────────────────────────────────────────────────── */
    .picker-wrap {
      position: relative;
      height: 150px;
      overflow: hidden;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.55);
      backdrop-filter: var(--blur);
      user-select: none;
      touch-action: none;
      cursor: grab;
    }

    [data-theme="dark"] .picker-wrap {
      background: rgba(28,28,30,0.58);
    }

    .picker-wrap:active { cursor: grabbing; }

    .picker-scroll {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      will-change: transform;
      transition: none;
    }

    .picker-scroll.snapping {
      transition: transform 320ms cubic-bezier(0.23, 1, 0.32, 1);
    }

    .picker-wrap {
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .picker-wrap.is-dragging {
      transform: scale(1.02);
      box-shadow: 0 14px 28px rgba(0,0,0,0.10);
    }

    .picker-item {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: var(--text-tertiary);
      transition: color 120ms ease, transform 120ms ease, opacity 120ms ease, filter 120ms ease;
      pointer-events: none;
    }

    .picker-item.selected {
      color: var(--text);
      font-size: 28px;
      filter: saturate(1.1);
    }

    .picker-highlight {
      position: absolute;
      top: 50px;
      left: 8px;
      right: 8px;
      height: 50px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      background: rgba(0,122,255,0.10);
      border: 1.5px solid rgba(0,122,255,0.30);
      pointer-events: none;
      z-index: 2;
    }

    [data-theme="dark"] .picker-highlight {
      background: rgba(10,132,255,0.15);
      border-color: rgba(10,132,255,0.40);
    }

    .picker-fade {
      position: absolute;
      left: 0;
      right: 0;
      height: 50px;
      pointer-events: none;
      z-index: 3;
    }

    .picker-fade-top {
      top: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 100%);
    }

    .picker-fade-bottom {
      bottom: 0;
      background: linear-gradient(to top, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 100%);
    }

    [data-theme="dark"] .picker-fade-top {
      background: linear-gradient(to bottom, rgba(28,28,30,0.90) 0%, rgba(28,28,30,0) 100%);
    }

    [data-theme="dark"] .picker-fade-bottom {
      background: linear-gradient(to top, rgba(28,28,30,0.90) 0%, rgba(28,28,30,0) 100%);
    }

    /* ── Score Adjust Buttons ───────────────────────────────────────────────
       +/− increment buttons shown below the pickers in Ejbar mode, allowing
       quick taps instead of scrolling. .rlabel is the team name label above
       each picker column. .submit-in-card wraps the Submit button inside the
       score input card.
    ─────────────────────────────────────────────────────────────────────── */
      .score-btn {
        border-radius: var(--radius);
        corner-shape: var(--corner-shape);
        border: 1px solid var(--stroke);
        background: rgba(118,118,128,0.16);
        color: var(--text);
        font-size: 20px;
        font-weight: 900;
        height: 48px;
        cursor: pointer;
      }

      [data-theme="dark"] .score-btn {
        background: rgba(28,28,30,0.58);
      }

      .score-btn:active {
        transform: scale(0.96);
      }

    .rlabel {
      font-size: 11px;
      font-weight: 900;
      color: var(--text-secondary);
      margin: 0 10px 2px;
      display: block;
    }

    .submit-in-card {
      margin-top: 12px;
    }

    /* ── History List ───────────────────────────────────────────────────────
       Scrollable list of completed rounds. Each .row is a two-column grid
       with a .mini card per team. .mini variants (milestone, shelem-green,
       shelem-gold, shelem-red) colour-code Shelem result types. .delta shows
       the per-round score change; .roundtag shows the round number. Long-press
       on a row opens the action sheet to edit or delete that round.
    ─────────────────────────────────────────────────────────────────────── */
    .list {
      margin-top: 8px;
      overflow: hidden;
    }

    [data-theme="dark"] .list {
      border: 0px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding-bottom: 10px; 
      align-items: center;
    }

    .row:last-child { border-bottom: none; }

    .mini {
      position: relative;
      padding: 10px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid rgba(60,60,67,0.10);
      background: rgba(118,118,128,0.10);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    [data-theme="dark"] .mini { border-color: rgba(84,84,88,0.40); }

    .mini.milestone {
      border: 1px solid rgba(52,199,89,0.55);
      background: rgba(52,199,89,0.10);
    }

    .mini.shelem-green {
      border: 1px solid rgba(52,199,89,0.65);
      background: rgba(52,199,89,0.14);
      box-shadow: inset 0 0 0 1px rgba(52,199,89,0.12);
    }

    .mini.shelem-gold {
      border: 1px solid rgba(255,204,0,0.75);
      background: rgba(255,204,0,0.16);
      box-shadow: inset 0 0 0 1px rgba(255,204,0,0.14);
    }

    .mini.shelem-red {
      border: 1px solid rgba(255,59,48,0.65);
      background: rgba(255,59,48,0.14);
      box-shadow: inset 0 0 0 1px rgba(255,59,48,0.12);
    }

    .line {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-secondary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini > .line { margin-bottom: 0; }

    .delta {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.4px;
      direction: ltr;
      unicode-bidi: isolate;
    }

    .delta.win { color: var(--green); }
    .delta.lose { color: var(--red); }

    .roundtag {
      position: absolute;
      right: 10px;
      bottom: 8px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.8px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
    }

    /* ── Victory Overlay ────────────────────────────────────────────────────
       Full-screen frosted backdrop with a centred card that announces the
       winner. Appears when either team reaches the target score. Dismissed
       by the New Game button or tapping outside.
    ─────────────────────────────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    [data-theme="dark"] .overlay { background: rgba(0,0,0,0.55); }

    .overlay.show { display: flex; }

    .victory {
      width: 100%;
      max-width: 420px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 1px solid var(--stroke);
      background: var(--card);
      backdrop-filter: var(--blur);
      padding: 18px 16px;
      text-align: center;
      animation: pop 240ms ease-out;
    }

    @keyframes pop {
      from { transform: scale(0.96); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .trophy {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .victory h3 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.4px;
      margin-bottom: 4px;
    }

    .victory p {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ── Action Sheet ───────────────────────────────────────────────────────
       Bottom-sheet that slides up when the user long-presses a history row.
       Offers Edit and Delete actions for that round. .sheet-card groups the
       action buttons with iOS-style separators. Cancel lives in its own card.
    ─────────────────────────────────────────────────────────────────────── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(6px);
      display: none;
      align-items: flex-end;
      z-index: 200;
    }

    .sheet-overlay.show { display: flex; }

    .action-sheet {
      width: 100%;
      max-width: 680px;
      margin: 0 auto env(safe-area-inset-bottom);
      padding: 12px;
      animation: sheetUp 220ms ease-out;
    }

    @keyframes sheetUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet-card {
      background: var(--card);
      backdrop-filter: var(--blur);
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      overflow: hidden;
      border: 1px solid var(--stroke);
      margin-bottom: 10px;
    }

    .sheet-btn {
      width: 100%;
      padding: 16px;
      border: none;
      background: transparent;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: var(--text);
    }

    .sheet-btn + .sheet-btn {
      border-top: 1px solid rgba(60,60,67,0.15);
    }

    .sheet-btn.destructive { color: var(--red); }

    .sheet-btn:active {
      background: rgba(118,118,128,0.14);
    }

    [data-theme="dark"] .sheet-btn:active {
      background: rgba(118,118,128,0.24);
    }

    /* ── History Column Headers ─────────────────────────────────────────── */
    .history-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 6px 2px 2px;
      color: var(--text-tertiary);
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .history-header > div {
      text-align: center;
    }

    @keyframes totalPulse {
      0%   { transform: scale(1); }
      22%  { transform: scale(1.03); }
      55%  { transform: scale(0.997); }
      78%  { transform: scale(1.006); }
      100% { transform: scale(1); }
    }

    .total-pulse {
      animation: totalPulse 550ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes turnPulse {
      0%   { transform: scale(1); }
      22%  { transform: scale(1.022); }
      55%  { transform: scale(0.998); }
      100% { transform: scale(1); }
    }

    .turn-pulse {
      animation: turnPulse 520ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── Responsive & Accessibility ─────────────────────────────────────────
       Slightly smaller title and score value on narrow phones.
       Ensures all controls inherit the app font (Safari/iOS resets these).
       RTL layout: in Farsi mode the round tag flips to the left edge.
    ─────────────────────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .title { font-size: 30px; }
      .score-value { font-size: 44px; }
    }
  
    /* UI-only: ensure controls inherit font (Safari/iOS) */
    button, input, select, textarea { font-family: inherit; }

    /* UI-only: RTL history tag ("دست ۱") sits on the left */
    [dir="rtl"] .roundtag { right: auto; left: 10px; text-align: left; }

    /* ── Suit Picker (Shelem) ───────────────────────────────────────────────
       Row of four suit buttons (♠ ♥ ♦ ♣) shown only in Shelem mode.
       The selected suit gets a gold background; used when recording trump.
    ─────────────────────────────────────────────────────────────────────── */
    .suit-row {
      display: flex;
      gap: 8px;
      margin: 12px 0 4px;
    }

    .suit-btn {
      flex: 1;
      height: 60px;
      border-radius: var(--radius);
      corner-shape: var(--corner-shape);
      border: 0px solid var(--stroke);
      background: rgba(118,118,128,0.10);
      font-size: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;

    (function() {
      function makeAppleTouchPNG() {
        const svgLink = document.querySelector('link[rel="icon"]');
        const appleLink = document.querySelector('link[rel="apple-touch-icon"]');
        if (!svgLink || !appleLink) return;
        const img = new Image();
        img.onload = function() {
          try {
            const c = document.createElement('canvas');
            c.width = c.height = 180;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 180, 180);
            ctx.drawImage(img, 0, 0, 180, 180);
            appleLink.href = c.toDataURL('image/png');
          } catch (e) {}
        };
        img.src = svgLink.getAttribute('href');
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', makeAppleTouchPNG);
      } else {
        makeAppleTouchPNG();
      }
    })();
  </script>

  <script>
    /*
    ════════════════════════════════════════════════════════════════
    EJBAR — JavaScript Module Index
    Single-file PWA for scoring the Iranian card games Ejbar & Shelem.
    All JS lives here in one <script> tag after the main HTML.
    ════════════════════════════════════════════════════════════════

    1. DOM INITIALIZATION & STATE
       - initDOMElements()   — cache every used element into the $ object
       - gameState           — single source of truth for current game data
       - TARGET_* constants  — winning score thresholds per game type
       - Haptic              — navigator.vibrate() patterns for feedback
       - STORAGE_KEY / ARCHIVE_KEY — localStorage namespaces

    2. PERSISTENCE
       - saveGameState()     — write gameState to localStorage
       - loadGameState()     — restore gameState on app launch
       - saveArchive()       — append finished game to archive
       - getArchive()        — read archive array from localStorage

    3. ARCHIVE
       - renderArchive()         — render all saved games in the archive list
       - archiveCurrentGame()    — move current game into archive on new game
       - formatArchiveDate()     — human-readable date for archive entries
       - formatSignedScore()     — "+12" / "−5" display format
       - openArchiveDetails()    — show detail overlay for a saved game
       - closeArchiveDetails()   — close the detail overlay

    4. GAME RULES & SCORING
       - getTargetScore()           — winning target for the current game type
       - getScoreBounds()           — valid score range (min/max/default)
       - parseScoreValue()          — validate Ejbar score input
       - parseShelemScoreValue()    — validate Shelem score input
       - enforceForcedBidIfNeeded() — applies forced-bid rule for 8/9 Ejbar
       - selectSuit() / resetSuit() — Shelem trump suit selection
       - toggleMinus() / updateMinusBtnState() — negative-score toggle

    5. SCROLL PICKER COMPONENT
       - PICKER_ITEM_H / PICKER_VISIBLE / PICKER_PAD — layout constants
       - pickerValueToOffset() / pickerOffsetToValue() — coordinate math
       - getAllowedPickerValues() / buildPickerItems() — data generation
       - updatePickerHighlight() — move the blue selection band
       - initPicker()           — full picker init: touch + mouse + keyboard
       - picker1 / picker2      — global picker instances
       - setPickersEnabled()    — lock/unlock pickers after game ends
       - syncDirectInputsFromHidden() / syncHiddenInputsFromDirect()
       - updateScoreInputMode() — swap picker ↔ direct-input for Shelem
       - clearDirectInputs() / initPickers()

    6. CORE GAMEPLAY
       - selectGameType()    — set game type and update UI label
       - getGameTitle()      — derive all-caps game name for scoreboard header
       - startGame()         — validate setup and transition to game screen
       - updateTeamNames()   — push team names to all display elements
       - addScore()          — validate and record a round (main submit handler)
       - adjustScore()       — +/− buttons increment picker values

    7. UI RENDERING
       - updateUI()          — re-render scoreboard, history list, highlights
       - escapeHtml()        — sanitise user text before injecting into innerHTML
       - checkWinner()       — check if target reached; call showWinner()
       - showWinner()        — display victory overlay with winner info
       - closeWinner()       — dismiss the victory overlay

    8. HISTORY & ROUND MANAGEMENT
       - openSheet() / closeSheet()   — show/hide the long-press action sheet
       - sheetEdit() / sheetDelete()  — action sheet button handlers
       - setupLongPress()             — attach delegated touch listeners once
       - deleteRound()                — remove a round and recalculate totals
       - editRound()                  — overwrite a round's scores
       - newGame()                    — archive current game, reset state
       - clearHistory()               — wipe round history without archiving

    9. THEME, LOCALISATION & INITIALISATION
       - squircleReveal()    — CSS View Transition helper: circle-reveal from button
       - applyTheme()        — apply data-theme attribute + Lottie icon crossfade
       - toggleTheme()       — toggle between light and dark with squircle reveal
       - syncSubmitEnabled() — enable/disable Submit based on current input state
       - I18N_UI             — translation strings for English ("en") and Farsi ("fa")
       - DIGITS_FA_UI        — Persian digit characters for number localisation
       - toFaDigitsUI()      — convert ASCII digits → Persian digits
       - toEnDigitsUI()      — convert Persian digits → ASCII digits
       - localizeDisplayedNumbersUI() — walk the DOM and convert all numbers
       - applyLangUI()       — set all text strings and re-localize numbers
       - toggleLang()        — switch language with squircle reveal
       - DOMContentLoaded    — boot sequence: init DOM, load state, set up events
       - Lottie init         — load moon/sun animations and set initial opacity

    ════════════════════════════════════════════════════════════════
    */

    // ── DOM Element Cache ────────────────────────────────────────────────────
    // All element lookups happen once in initDOMElements() and are stored here.
    // Access via $.elementName throughout the app instead of getElementById().
    // ─────────────────────────────────────────────────────────────────────────
    let $ = {};
    
    function initDOMElements() {
      $ = {
        setupScreen: document.getElementById('setupScreen'),
        gameScreen: document.getElementById('gameScreen'),
        team1Name: document.getElementById('team1Name'),
        team2Name: document.getElementById('team2Name'),
        team1Total: document.getElementById('team1Total'),
        team2Total: document.getElementById('team2Total'),
        team1Points: document.getElementById('team1Points'),
        team2Points: document.getElementById('team2Points'),
        team1Card: document.getElementById('team1Card'),
        team2Card: document.getElementById('team2Card'),
        result1: document.getElementById('result1'),
        result2: document.getElementById('result2'),
        directInput1: document.getElementById('directInput1'),
        directInput2: document.getElementById('directInput2'),
        directInputWrap1: document.getElementById('directInputWrap1'),
        directInputWrap2: document.getElementById('directInputWrap2'),
        submitBtn: document.getElementById('submitBtn'),
        historyList: document.getElementById('historyList'),
        emptyHistory: document.getElementById('emptyHistory'),
        targetHint: document.getElementById('targetHint'),
        winnerOverlay: document.getElementById('winnerOverlay'),
        sheetOverlay: document.getElementById('sheetOverlay'),
        archiveList: document.getElementById('archiveList'),
        emptyArchive: document.getElementById('emptyArchive'),
        archiveTitle: document.getElementById('archiveTitle'),
        archiveHint: document.getElementById('archiveHint'),
        clearArchiveBtn: document.getElementById('clearArchiveBtn'),
        archiveOverlay: document.getElementById('archiveOverlay'),
        archiveOverlayTitle: document.getElementById('archiveOverlayTitle'),
        archiveOverlayMeta: document.getElementById('archiveOverlayMeta'),
        archiveOverlayBody: document.getElementById('archiveOverlayBody'),
        archiveOverlayGameType: document.getElementById('archiveOverlayGameType'),
        archiveSummaryTeam1: document.getElementById('archiveSummaryTeam1'),
        archiveSummaryTeam2: document.getElementById('archiveSummaryTeam2'),
        archiveSummaryScore1: document.getElementById('archiveSummaryScore1'),
        archiveSummaryScore2: document.getElementById('archiveSummaryScore2'),
        archiveSummaryPoints1: document.getElementById('archiveSummaryPoints1'),
        archiveSummaryPoints2: document.getElementById('archiveSummaryPoints2'),
        archiveHistoryCol1: document.getElementById('archiveHistoryCol1'),
        archiveHistoryCol2: document.getElementById('archiveHistoryCol2')
      };
    }

    // ── Game State ───────────────────────────────────────────────────────────
    // Central game state object that tracks everything about the current game:
    // - gameType: 7, 9, or 'shelem' (determines score rules and targets)
    // - team1/team2 Names: User-entered team names
    // - team1/team2 Total: Cumulative score across all rounds
    // - team1/team2 Points: Card points scored in current round (before saving)
    // - history: Array of all completed rounds [{team, points, turn}, ...]
    // - winner: null until target score is reached
    // - lastTurn: Tracks whose turn it was (1 or 2) for alternation
    let gameState = {
      lastTurn: 1,
      gameType: null,
      team1Name: 'Ma',
      team2Name: 'Shoma',
      team1Total: 0,
      team2Total: 0,
      team1Points: 0,
      team2Points: 0,
      history: [],
      winner: null
    };

    // ── Constants ────────────────────────────────────────────────────────────
    // Game winning targets - must reach this score to win
    // 7 Ejbar: 350 points (traditional Ejbar game with lower target)
    // 9 Ejbar: 550 points (extended Ejbar with higher target and score range)
    // Shelem: 1200 points (special game mode with different scoring rules, no minimum bid)
    const TARGET_6Ejbar = 350;
    const TARGET_7Ejbar = 350;
    const TARGET_8Ejbar = 550;
    const TARGET_9Ejbar = 550;
    const TARGET_shelem = 1200;
    let sheetIndex = null;
    let prevTurnOutlined = null;
    let pressTimer = null;

    const STORAGE_KEY = 'ejbarGameStateV3';
    const ARCHIVE_KEY = 'ejbarGameArchiveV1';

    // ── Haptic Feedback ──────────────────────────────────────────────────────
    const Haptic = {
      light:   () => navigator.vibrate?.(4),
      medium:  () => navigator.vibrate?.(10),
      heavy:   () => navigator.vibrate?.(25),
      success: () => navigator.vibrate?.([10, 60, 15]),
      error:   () => navigator.vibrate?.([30, 40, 30]),
      warning: () => navigator.vibrate?.(20),
    };

    function saveGameState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
      } catch (e) {
        // Storage unavailable
      }
    }

    function loadGameState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return;
        gameState = Object.assign(gameState, parsed);
      } catch (e) {
        console.warn('Could not load game state', e);
        return;
      }

      if ($.team1Name) $.team1Name.value = getDisplayTeamName(gameState.team1Name || 'Ma');
      if ($.team2Name) $.team2Name.value = getDisplayTeamName(gameState.team2Name || 'Shoma');

      updateTeamNames();

      if (gameState.gameType) {
        if ($.setupScreen) $.setupScreen.classList.add('hidden');
        if ($.gameScreen) $.gameScreen.classList.remove('hidden');
        const t = I18N_UI[currentLangUI];
        if ($.targetHint) $.targetHint.textContent = t.target(getTargetScore());
      }

      updateUI();
    }

    function getArchive() {
      try {
        const raw = localStorage.getItem(ARCHIVE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveArchive(items) {
      try {
        localStorage.setItem(ARCHIVE_KEY, JSON.stringify(items));
      } catch (e) {
        // Storage unavailable
      }
    }

    function getGameTypeLabel(type) {
      if (type === 'shelem') return 'Shelem';
      if (type === 6 || type === '6') return '6 Ejbar';
      if (type === 7 || type === '7') return '7 Ejbar';
      if (type === 8 || type === '8') return '8 Ejbar';
      if (type === 9 || type === '9') return '9 Ejbar';
      return 'Ejbar';
    }

    function getDrawLabelByLang(lang = currentLangUI) {
      return lang === 'fa' ? 'مساوی' : 'Draw';
    }

    function getDisplayTeamName(value, options = {}) {
      const raw = String(value || '').trim();
      if (options.uppercase) return raw.toUpperCase();
      return raw;
    }

    function archiveCurrentGame() {
      if (!gameState.history || !gameState.history.length) return;
      if (gameState.archivedAt) return;

      const archive = getArchive();
      const winnerKey = gameState.team1Total === gameState.team2Total
        ? 'draw'
        : (gameState.team1Total > gameState.team2Total ? 'team1' : 'team2');
      const winnerName = winnerKey === 'draw'
        ? getDrawLabelByLang('en')
        : (winnerKey === 'team1' ? gameState.team1Name : gameState.team2Name);

      const item = {
        id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
        gameType: gameState.gameType,

    // ── Theme Management ─────────────────────────────────────────────────────
    // squircleReveal, applyTheme, toggleTheme — see index §9

    function squircleReveal(originEl, callback) {
      const rect = originEl
        ? originEl.getBoundingClientRect()
        : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0, height: 0 };
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      document.documentElement.style.setProperty('--squircle-x', `${cx}px`);
      document.documentElement.style.setProperty('--squircle-y', `${cy}px`);

      if (!document.startViewTransition) {
        callback();
        return;
      }
      document.startViewTransition(callback);
    }

    function applyTheme(theme) {
      const html = document.documentElement;
      html.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme === 'dark' ? '#000000' : '#F2F2F7');
      const moonEl = document.getElementById('themeLottieMoon');
      const sunEl  = document.getElementById('themeLottieSun');
      if (moonEl && sunEl) {
        if (theme === 'dark') {
          sunEl.style.opacity  = '1';
          moonEl.style.opacity = '0';
          if (window.sunLottieAnim) window.sunLottieAnim.goToAndPlay(0, true);
        } else {
          moonEl.style.opacity = '1';
          sunEl.style.opacity  = '0';
          if (window.moonLottieAnim) window.moonLottieAnim.goToAndPlay(0, true);
        }
      }
    }

    const MATRIX_POOL_EN = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const MATRIX_POOL_FA = "ابتثجچحخدذرزژسشصضطظعغفقکگلمنوهی۰۱۲۳۴۵۶۷۸۹";

    function isMatrixStaticChar(ch) {
      return /\s/.test(ch) || /[.,!?;:(){}\[\]'"`~\-_/\\|@#$%^&*+=<>،؛؟]/.test(ch);
    }

    function randomMatrixChar(targetChar, lang) {
      if (isMatrixStaticChar(targetChar)) return targetChar;
      const pool = lang === "fa" ? MATRIX_POOL_FA : MATRIX_POOL_EN;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function matrixTextReveal(el, finalText, lang = currentLangUI) {
      if (!el || finalText == null) return;
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        el.textContent = finalText;
        return;
      }

      const chars = Array.from(String(finalText));
      const total = chars.length || 1;
      const duration = Math.min(680, 320 + total * 14);
      const runId = (Number(el.dataset.matrixRunId || "0") + 1).toString();
      el.dataset.matrixRunId = runId;
      const start = performance.now();

      function frame(now) {
        if (el.dataset.matrixRunId !== runId) return;
        const progress = Math.min(1, (now - start) / duration);
        const out = chars.map((ch, i) => {
          if (isMatrixStaticChar(ch)) return ch;
          const edge = progress * 1.25 - (i / Math.max(1, total - 1)) * 0.9;
          return edge > 0.08 ? ch : randomMatrixChar(ch, lang);
        }).join("");
        el.textContent = out;
        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          el.textContent = finalText;
        }
      }

      requestAnimationFrame(frame);
    }

    function runMatrixTranslationAnimation(targets, lang = currentLangUI) {
      if (!Array.isArray(targets) || targets.length === 0) return;
      const unique = Array.from(new Set(targets)).filter(el => el && el.isConnected);
      unique.forEach((el, idx) => {
        const finalText = el.textContent;
        if (!finalText || !String(finalText).trim()) return;
        setTimeout(() => matrixTextReveal(el, finalText, lang), Math.min(220, idx * 18));
      });
    }

    function toggleTheme() {
      Haptic.light();
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      const next = current === 'dark' ? 'light' : 'dark';
      const btn = document.querySelector('button[onclick="toggleTheme()"]');
      squircleReveal(btn, () => applyTheme(next));
    }

    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') {
        applyTheme(saved);
        return;
      }
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark ? 'dark' : 'light');
    })();
