    // ── Scroll Picker Component ──────────────────────────────────────────────
    // Scroll wheel picker: constants, utilities, and initialization
    // The picker is a custom scroll-based input that displays values as a vertical list
    // User scrolls to select a value (-9 to +9 for 7/9 Ejbar, -13 to +13 for 9 Ejbar)
    // This provides a tactile, phone-friendly alternative to typing numbers

    // --- Picker Configuration & Constants ---

    const PICKER_ITEM_H = 50;
    const PICKER_VISIBLE = 3; // show 3 items (top, selected, bottom)
    const PICKER_PAD = 1; // 1 blank slot top & bottom for centering
    const PICKER_MIN = -13;
    const PICKER_MAX = 13;
    function getScoreBounds() {
      if (gameState.gameType === 'shelem') return { min: -9999, max: 9999, absMin: 0, defaultValue: 0 };
      if (gameState.gameType === 8 || gameState.gameType === 9) return { min: -13, max: 13, absMin: 4, defaultValue: 0 };
      return { min: -9, max: 9, absMin: 3, defaultValue: 0 };
    }

    function parseScoreValue(raw) {
      const s = (raw ?? '').toString().trim();
      if (s === '' || s === '-') return null;
      if (!/^-?\d+$/.test(s)) return null;
      const n = parseInt(s, 10);
      const bounds = getScoreBounds();
      if (isNaN(n) || n < bounds.min || n > bounds.max) return null;
      if (gameState.gameType !== 'shelem') {
        if (n === 0) return 0;
        if (n > 0 && n < bounds.absMin) return null;
        if (n < 0 && Math.abs(n) < bounds.absMin) return null;
      }
      return n;
    }

    function parseShelemScoreValue(raw) {
      const s = toEnDigitsUI((raw ?? '').toString()).trim();
      if (s === '') return null;
      if (!/^-?\d+$/.test(s)) return null;
      const n = parseInt(s, 10);
      if (isNaN(n)) return null;
      if (n !== 0 && n % 5 !== 0) return null;
      return n;
    }

    // --- Shelem Game Mode ---
    // Shelem is a special game variant with different scoring rules:
    // - No minimum bid requirement (can bid 0 points)
    // - Scores must be multiples of 5
    // - Has suit selection (♠, ♥, ♦, ♣) as part of game rules
    // - Uses direct numerical input instead of scroll picker

    let selectedSuit = null;
    // Tracks which suit is selected in Shelem mode (used for display/reference)
    // Can be: '♠', '♥', '♦', '♣', or null if not selected
    function selectSuit(suit) {
      selectedSuit = (selectedSuit === suit) ? null : suit;
      document.querySelectorAll('.suit-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.textContent === selectedSuit);
      });
      Haptic.light();
    }

    function resetSuit() {
      selectedSuit = null;
      document.querySelectorAll('.suit-btn').forEach(btn => btn.classList.remove('selected'));
    }

    function updateMinusBtnState(n) {
      const input = document.getElementById(`directInput${n}`);
      const btn = document.getElementById(`minusBtn${n}`);
      if (!btn) return;
      const isNeg = input && input.value.trimStart().startsWith('-');
      btn.classList.toggle('active', !!isNeg);
    }

    function toggleMinus(n) {
      const input = document.getElementById(`directInput${n}`);
      if (!input) return;
      const val = input.value;
      if (val.trimStart().startsWith('-')) {
        input.value = val.replace(/^\s*-/, '');
      } else {
        input.value = val ? `-${val}` : '-';
      }
      updateMinusBtnState(n);
      syncSubmitEnabled();
    }

    function pickerValueToOffset(val) {
      const idx = val - PICKER_MIN; // 0-based index
      return -(idx * PICKER_ITEM_H);
    }

    function pickerOffsetToValue(offset) {
      const idx = Math.round(-offset / PICKER_ITEM_H);
      return Math.max(PICKER_MIN, Math.min(PICKER_MAX, idx + PICKER_MIN));
    }

    function getAllowedPickerValues() {
      const bounds = getScoreBounds();
      if (gameState.gameType === 'shelem') {
        const vals = [];
        for (let v = PICKER_MIN; v <= PICKER_MAX; v++) vals.push(v);
        return vals;
      }
      const vals = [];
      for (let v = bounds.min; v <= -bounds.absMin; v++) vals.push(v);
      vals.push(0);
      for (let v = bounds.absMin; v <= bounds.max; v++) vals.push(v);
      return vals;
    }

    function buildPickerItems(scrollEl) {
      const values = getAllowedPickerValues();
      let html = '';
      for (const v of values) {
        html += `<div class="picker-item" data-value="${v}">${v > 0 ? '' + v : v}</div>`;
      }
      scrollEl.innerHTML = html;
    }

    function updatePickerHighlight(scrollEl, currentValue) {
      scrollEl.querySelectorAll('.picker-item').forEach(item => {
        const v = parseInt(item.getAttribute('data-value'), 10);
        item.classList.toggle('selected', v === currentValue);
      });
    }

    function initPicker(scrollEl, hiddenInput) {
      const state = {
        index: 0,
        visualIndex: 0,
        startY: 0,
        startIndex: 0,
        dragging: false,
        velocity: 0,
        lastY: 0,
        lastTime: 0,
        lastHapticIndex: 0
      };

      function getValues() {
        return getAllowedPickerValues();
      }

      function rebuild() {
        buildPickerItems(scrollEl);
      }

      function clampIndex(i) {
        const values = getValues();
        return Math.max(0, Math.min(values.length - 1, i));
      }

      function findClosestIndex(val) {
        const values = getValues();
        let bestIndex = 0;
        let bestDist = Infinity;
        values.forEach((v, i) => {
          const dist = Math.abs(v - val);
          if (dist < bestDist) {
            bestDist = dist;
            bestIndex = i;
          }
        });
        return bestIndex;
      }

      function renderAtVisualIndex(extraOffset = 0) {
        const values = getValues();
        const nearestIndex = clampIndex(Math.round(state.visualIndex));
        const value = values[nearestIndex] ?? 0;
        const offset = -(state.visualIndex * PICKER_ITEM_H);
        scrollEl.style.transform = `translateY(${offset + PICKER_ITEM_H + extraOffset}px)`;
        hiddenInput.value = String(value);
        updatePickerHighlight(scrollEl, value);
      }

      function applyIndex(i, animated = false, extraOffset = 0) {
        rebuild();
        state.index = clampIndex(i);
        state.visualIndex = state.index;
        if (animated) scrollEl.classList.add('snapping');
        else scrollEl.classList.remove('snapping');
        renderAtVisualIndex(extraOffset);
        if (animated) setTimeout(() => scrollEl.classList.remove('snapping'), 340);
      }

      function getY(e) {
        if (e.touches && e.touches.length) return e.touches[0].clientY;
        return e.clientY;
      }

      function onStart(e) {
        if (gameState.gameType === 'shelem') return;
        scrollEl.classList.remove('snapping');
        if (scrollEl.parentElement) scrollEl.parentElement.classList.add('is-dragging');
        state.dragging = true;
        state.startY = getY(e);
        state.startIndex = state.visualIndex;
        state.lastY = state.startY;
        state.lastTime = Date.now();
        state.velocity = 0;
        state.lastHapticIndex = Math.round(state.visualIndex);
      }

      function onMove(e) {
        if (!state.dragging) return;
        e.preventDefault();
        const y = getY(e);
        const delta = y - state.startY;
        state.visualIndex = clampIndex(state.startIndex - (delta / PICKER_ITEM_H));

        const nearestNow = Math.round(state.visualIndex);
        if (nearestNow !== state.lastHapticIndex) {
          state.lastHapticIndex = nearestNow;
          Haptic.light();
        }

        const now = Date.now();
        const dt = now - state.lastTime;
        if (dt > 0) state.velocity = (y - state.lastY) / dt;
        state.lastY = y;
        state.lastTime = now;

        renderAtVisualIndex(0);
        syncSubmitEnabled();
      }

      function onEnd() {
        if (!state.dragging) return;
        state.dragging = false;
        if (scrollEl.parentElement) scrollEl.parentElement.classList.remove('is-dragging');

        const momentumSteps = Math.round((-state.velocity * 120) / PICKER_ITEM_H);
        const finalIndex = clampIndex(Math.round(state.visualIndex) + momentumSteps);
        state.index = finalIndex;
        state.visualIndex = finalIndex;

        Haptic.light();
        const bounce = Math.max(-8, Math.min(8, -state.velocity * 14));
        applyIndex(finalIndex, true, bounce);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => applyIndex(finalIndex, true, 0));
        });
        syncSubmitEnabled();
      }

      scrollEl.parentElement.addEventListener('touchstart', onStart, { passive: true });
      scrollEl.parentElement.addEventListener('touchmove', onMove, { passive: false });
      scrollEl.parentElement.addEventListener('touchend', onEnd, { passive: true });

      scrollEl.parentElement.addEventListener('mousedown', (e) => {
        e.preventDefault();
        onStart(e);
        const moveHandler = (ev) => onMove(ev);
        const upHandler = () => {
          onEnd();
          document.removeEventListener('mousemove', moveHandler);
          document.removeEventListener('mouseup', upHandler);
        };
        document.addEventListener('mousemove', moveHandler);
        document.addEventListener('mouseup', upHandler);
      });

      scrollEl.parentElement.addEventListener('wheel', (e) => {
        if (gameState.gameType === 'shelem') return;
        e.preventDefault();
        state.index = clampIndex(state.index + (e.deltaY > 0 ? 1 : -1));
        Haptic.light();
        applyIndex(state.index, true);
        syncSubmitEnabled();
      }, { passive: false });

      applyIndex(findClosestIndex(getScoreBounds().defaultValue), false);

      return {
        setValue(val) {
          applyIndex(findClosestIndex(parseInt(val, 10) || getScoreBounds().defaultValue), true);
        },
        getValue() {
          const values = getValues();
          return values[state.index] ?? 0;
        },
        refresh() {
          applyIndex(findClosestIndex(parseInt(hiddenInput.value, 10) || getScoreBounds().defaultValue), false);
        }
      };
    }

    let picker1 = null;
    let picker2 = null;

    // --- Picker Control Functions ---

    function setPickersEnabled(enabled) {
      const pw1 = document.getElementById('pickerWrap1');
      const pw2 = document.getElementById('pickerWrap2');
      if (pw1) { pw1.style.pointerEvents = enabled ? '' : 'none'; pw1.style.opacity = enabled ? '' : '0.4'; }
      if (pw2) { pw2.style.pointerEvents = enabled ? '' : 'none'; pw2.style.opacity = enabled ? '' : '0.4'; }
    }

    // --- Score Input Synchronization ---

    function syncDirectInputsFromHidden() {
      if (gameState.gameType === 'shelem') {
        if ($.directInput1 && $.directInput1.value === '0') $.directInput1.value = '';
        if ($.directInput2 && $.directInput2.value === '0') $.directInput2.value = '';
        return;
      }
      if ($.directInput1) $.directInput1.value = $.result1 ? $.result1.value : '';
      if ($.directInput2) $.directInput2.value = $.result2 ? $.result2.value : '';
    }

    function syncHiddenInputsFromDirect() {
      if (gameState.gameType === 'shelem') {
        const raw1 = toEnDigitsUI($.directInput1?.value || '').trim();
        const raw2 = toEnDigitsUI($.directInput2?.value || '').trim();
        const n1 = parseShelemScoreValue(raw1);
        const n2 = parseShelemScoreValue(raw2);
        if ($.result1) $.result1.value = n1 === null ? '' : String(n1);
        if ($.result2) $.result2.value = n2 === null ? '' : String(n2);
        return;
      }
      if ($.directInput1 && $.result1) $.result1.value = toEnDigitsUI($.directInput1.value || '').trim();
      if ($.directInput2 && $.result2) $.result2.value = toEnDigitsUI($.directInput2.value || '').trim();
    }

    function updateScoreInputMode() {
      const isshelem = gameState.gameType === 'shelem';
      const pw1 = document.getElementById('pickerWrap1');
      const pw2 = document.getElementById('pickerWrap2');
      if (pw1) pw1.classList.toggle('hidden', isshelem);
      if (pw2) pw2.classList.toggle('hidden', isshelem);
      if ($.directInputWrap1) $.directInputWrap1.classList.toggle('hidden', !isshelem);
      if ($.directInputWrap2) $.directInputWrap2.classList.toggle('hidden', !isshelem);
      const suitRowEl = document.querySelector('.suit-row');
      if (suitRowEl) suitRowEl.classList.toggle('hidden', !isshelem);
      if (!isshelem) resetSuit();

      if (isshelem) {
        if ($.directInput1 && $.directInput1.value === '0') $.directInput1.value = '';
        if ($.directInput2 && $.directInput2.value === '0') $.directInput2.value = '';
      } else {
        syncDirectInputsFromHidden();
      }
    }


    function clearDirectInputs() {
      if ($.directInput1) $.directInput1.value = '';
      if ($.directInput2) $.directInput2.value = '';
    }

    // --- Virtual Keyboard & Picker Initialization ---

    function initPickers() {
      const scroll1 = document.getElementById('pickerScroll1');
      const scroll2 = document.getElementById('pickerScroll2');
      if (!scroll1 || !scroll2 || !$.result1 || !$.result2) return;
      picker1 = initPicker(scroll1, $.result1);
      picker2 = initPicker(scroll2, $.result2);
      $.result1.value = '0';
      $.result2.value = '0';
      syncDirectInputsFromHidden();
      updateScoreInputMode();
      syncSubmitEnabled();
    }

    // ── Core Gameplay ────────────────────────────────────────────────────────
    // Game flow: type selection, initialization, teams, and scoring

    // --- Game Setup ---

    function toggleEjbarDropdown(event) {
      event.stopPropagation();
      Haptic.light();
      const dropdown = document.getElementById('ejbarDropdown');
      if (!dropdown) return;
      const isOpen = !dropdown.classList.contains('hidden') && !dropdown.classList.contains('closing');
      if (isOpen) {
        closeEjbarDropdown();
      } else {
        dropdown.classList.remove('hidden');
        dropdown.classList.remove('closing');
        document.querySelectorAll('.seg-btn').forEach(btn => btn.classList.remove('selected'));
        const ejbarBtn = document.querySelector('[data-type="ejbar-group"]');
        if (ejbarBtn) ejbarBtn.classList.add('selected');
        setTimeout(() => document.addEventListener('click', closeEjbarDropdown, { once: true }), 0);
      }
    }

    function closeEjbarDropdown() {
      const dropdown = document.getElementById('ejbarDropdown');
      if (!dropdown || dropdown.classList.contains('hidden') || dropdown.classList.contains('closing')) return;
      dropdown.classList.add('closing');
      dropdown.addEventListener('animationend', () => {
        dropdown.classList.add('hidden');
        dropdown.classList.remove('closing');
      }, { once: true });
    }

    function selectGameType(type) {
      Haptic.light();
      gameState.gameType = type;
      closeEjbarDropdown();
      document.querySelectorAll('.seg-btn').forEach(btn => btn.classList.remove('selected'));
      document.querySelectorAll('.ejbar-opt').forEach(btn => btn.classList.remove('selected'));
      if (type === 'shelem') {
        const sel = document.querySelector('[data-type="shelem"]');
        if (sel) sel.classList.add('selected');
        const ejbarMainBtn = document.getElementById('ejbarMainBtn');
        const t0 = I18N_UI[currentLangUI];
        if (ejbarMainBtn) ejbarMainBtn.textContent = t0.labels.ejbar;
      } else {
        const ejbarBtn = document.querySelector('[data-type="ejbar-group"]');
        if (ejbarBtn) ejbarBtn.classList.add('selected');
        const opt = document.querySelector(`.ejbar-opt[data-subtype="${type}"]`);
        if (opt) opt.classList.add('selected');
        const ejbarMainBtn = document.getElementById('ejbarMainBtn');
        if (ejbarMainBtn) {
          ejbarMainBtn.textContent = getGameTypeLabel(type);
          ejbarMainBtn.classList.remove('btn-pop');
          void ejbarMainBtn.offsetWidth; // force reflow to restart animation
          ejbarMainBtn.classList.add('btn-pop');
          ejbarMainBtn.addEventListener('animationend', () => ejbarMainBtn.classList.remove('btn-pop'), { once: true });
        }
      }
      const t = I18N_UI[currentLangUI];
      if ($.targetHint) $.targetHint.textContent = t.target(getTargetScore());
      updateScoreInputMode();

      if (gameState.gameType !== 'shelem') {
        const defaultVal = getScoreBounds().defaultValue;
        if ($.result1) $.result1.value = String(defaultVal);
        if ($.result2) $.result2.value = String(defaultVal);
        if (picker1) picker1.refresh();
        if (picker2) picker2.refresh();
      }

      syncSubmitEnabled();
      saveGameState();
    }

    function startGame() {
      if (!gameState.gameType) {
        Haptic.error();
        const t = I18N_UI[currentLangUI];
        alert(t.alertSelectGameType);
        return;
      }
      Haptic.medium();

      gameState.team1Name = ($.team1Name && $.team1Name.value) || getDisplayTeamName('Ma');
      gameState.team2Name = ($.team2Name && $.team2Name.value) || getDisplayTeamName('Shoma');

      if (gameState.gameType !== 'shelem') {
        const defaultVal = getScoreBounds().defaultValue;
        if ($.result1 && (!$.result1.value || $.result1.value === '0')) $.result1.value = String(defaultVal);
        if ($.result2 && (!$.result2.value || $.result2.value === '0')) $.result2.value = String(defaultVal);
        if (picker1) picker1.refresh();
        if (picker2) picker2.refresh();
      }

      updateTeamNames();
      const startBtn = document.querySelector('#setupScreen .btn.btn-primary');
      squircleReveal(startBtn, () => {
        if ($.setupScreen) $.setupScreen.classList.add('hidden');
        if ($.gameScreen) $.gameScreen.classList.remove('hidden');
        updateUI();
        syncSubmitEnabled();
        saveGameState();
      });
    }

    function getGameTitle(t) {
      const type = gameState.gameType;
      if (!type) return t.scoreboard;
      if (type === 'shelem') return t.labels.shelem.toUpperCase();
      const numLabel = { 6: t.labels.game6, 7: t.labels.game7, 8: t.labels.game8, 9: t.labels.game9 }[type];
      return numLabel ? (numLabel + ' ' + t.labels.ejbar).toUpperCase() : t.scoreboard;
    }

    function updateTeamNames() {
      const t = I18N_UI[currentLangUI];
      const ids = ['displayTeam1Name', 'displayTeam2Name', 'resultLabel1', 'resultLabel2', 'historyColTeam1', 'historyColTeam2'];
      const els = ids.map(id => document.getElementById(id));
      const team1Display = getDisplayTeamName(gameState.team1Name);
      const team2Display = getDisplayTeamName(gameState.team2Name);
      if (els[0]) els[0].textContent = getDisplayTeamName(gameState.team1Name, { uppercase: true });
      if (els[1]) els[1].textContent = getDisplayTeamName(gameState.team2Name, { uppercase: true });
      if (els[2]) els[2].textContent = `${team1Display} ${t.wonWord}`;
      if (els[3]) els[3].textContent = `${team2Display} ${t.wonWord}`;
      if (els[4]) els[4].textContent = team1Display;
      if (els[5]) els[5].textContent = team2Display;
      const sbH2 = document.querySelector('#gameScreen .section:nth-of-type(1) .section-title h2');
      if (sbH2) sbH2.textContent = getGameTitle(t);
    }

    function addScore() {
      const t = I18N_UI[currentLangUI];

      if (gameState.gameType === 'shelem') {
        const raw1 = toEnDigitsUI(($.directInput1?.value ?? '').trim());
        const raw2 = toEnDigitsUI(($.directInput2?.value ?? '').trim());

        const score1 = parseShelemScoreValue(raw1);
        const score2 = parseShelemScoreValue(raw2);

        if (score1 === null || score2 === null) {
          Haptic.error();
          alert(currentLangUI === 'fa'
            ? 'در شلم امتیازها باید مضربی از ۵ یا صفر باشند.'
            : 'In Shelem, scores must be multiples of 5 or zero.');
          return;
        }

        gameState.team1Total += score1;
        gameState.team2Total += score2;

        if (gameState.team1Total < gameState.team2Total) {
          gameState.lastTurn = 1;
        } else if (gameState.team2Total < gameState.team1Total) {
          gameState.lastTurn = 2;
        }

        Haptic.medium();
        gameState.history.push({ score1, score2, effective1: score1, effective2: score2, points1: 0, points2: 0, suit: selectedSuit });

        clearDirectInputs();
        updateMinusBtnState(1); updateMinusBtnState(2);
        resetSuit();
        if ($.result1) $.result1.value = '';
        if ($.result2) $.result2.value = '';

        updateUI();
        checkWinner();
        saveGameState();
        return;
      }

      const raw1 = ($.result1 && $.result1.value) || '';
      const raw2 = ($.result2 && $.result2.value) || '';
      const score1 = raw1.trim() === '' ? 0 : parseInt(raw1, 10);
      const score2 = raw2.trim() === '' ? 0 : parseInt(raw2, 10);
      const bounds = getScoreBounds();

      if (parseScoreValue(String(score1)) === null || parseScoreValue(String(score2)) === null) {
        Haptic.error();
        if (gameState.gameType === 8 || gameState.gameType === 9) {
          alert(currentLangUI === 'fa' ? 'در این نوع اجبار فقط ۴ تا ۱۳ و منفی ۴ تا منفی ۱۳ مجاز است.' : `In ${gameState.gameType} Ejbar, only 4 to 13 and -4 to -13 are allowed.`);
        } else {
          alert(currentLangUI === 'fa' ? 'در این نوع اجبار فقط ۳ تا ۹ و منفی ۳ تا منفی ۹ مجاز است.' : `In ${gameState.gameType} Ejbar, only 3 to 9 and -3 to -9 are allowed.`);
        }
        return;
      }

      let effective1 = score1;
      let effective2 = score2;
      if (gameState.gameType === 8 || gameState.gameType === 9) {
        if (score1 === 10) effective1 = 20;
        if (score2 === 10) effective2 = 20;
        if (score1 === -10) effective1 = -10;
        if (score2 === -10) effective2 = -10;
      }

      gameState.team1Total += effective1;
      gameState.team2Total += effective2;

      let points1 = 0, points2 = 0;
      if (gameState.gameType === 6) {
        if (score1 > 0 && (score1 === 6 || score1 === 8)) points1 = 1;
        if (score2 > 0 && (score2 === 6 || score2 === 8)) points2 = 1;
      } else if (gameState.gameType === 7) {
        if (score1 > 0 && (score1 === 7 || score1 === 9)) points1 = 1;
        if (score2 > 0 && (score2 === 7 || score2 === 9)) points2 = 1;
      } else if (gameState.gameType === 8) {
        if (score1 > 0 && score1 === 8) points1 = 1;
        if (score2 > 0 && score2 === 8) points2 = 1;
      } else if (gameState.gameType === 9) {
        if (score1 > 0 && score1 === 9) points1 = 1;
        if (score2 > 0 && score2 === 9) points2 = 1;
      }

      gameState.team1Points += points1;
      gameState.team2Points += points2;

      if (gameState.team1Total < gameState.team2Total) {
        gameState.lastTurn = 1;
      } else if (gameState.team2Total < gameState.team1Total) {
        gameState.lastTurn = 2;
      }

      Haptic.medium();
      gameState.history.push({ score1, score2, effective1, effective2, points1, points2, suit: selectedSuit });

      if ($.result1) $.result1.value = '0';
      if ($.result2) $.result2.value = '0';
      clearDirectInputs();
      if (picker1) picker1.setValue(0);
      if (picker2) picker2.setValue(0);
      updateMinusBtnState(1); updateMinusBtnState(2);
      resetSuit();

      updateUI();
      checkWinner();
      saveGameState();
    }

    function adjustScore(team, delta) {
      const input = team === 1 ? $.result1 : $.result2;
      if (!input) return;
      const raw = (input.value || '').trim();
      let value = raw === '' ? 0 : parseInt(raw, 10);
      if (isNaN(value)) value = 0;
      value += delta;
      const bounds = getScoreBounds();
      if (value < bounds.min) value = bounds.min;
      if (value > bounds.max) value = bounds.max;
      input.value = String(value);
      syncSubmitEnabled();
    }


    function updateUI() {
      enforceForcedBidIfNeeded();

      const totalMultiplier = gameState.gameType === 'shelem' ? 1 : 10;
      const newTotal1 = gameState.team1Total * totalMultiplier;
      const newTotal2 = gameState.team2Total * totalMultiplier;
      if ($.team1Total) $.team1Total.textContent = newTotal1;
      if ($.team2Total) $.team2Total.textContent = newTotal2;
      if ($.team1Points) $.team1Points.textContent = gameState.team1Points;
      if ($.team2Points) $.team2Points.textContent = gameState.team2Points;

      if ($.team1Points && $.team2Points) {
        const isShelem = gameState.gameType === 'shelem';
        $.team1Points.classList.toggle('hidden', isShelem);
        $.team2Points.classList.toggle('hidden', isShelem);

        if (isShelem) {
          $.team1Points.classList.remove('points-leading');
          $.team2Points.classList.remove('points-leading');
        } else {
          $.team1Points.classList.toggle('points-leading', gameState.team1Points > gameState.team2Points);
          $.team2Points.classList.toggle('points-leading', gameState.team2Points > gameState.team1Points);
        }
      }

      if ($.team1Card && $.team2Card) {
        $.team1Card.classList.remove('turn-outline', 'turn-pulse', 'total-highlight', 'total-pulse');
        $.team2Card.classList.remove('turn-outline', 'turn-pulse', 'total-highlight', 'total-pulse');

        let currentOutlined = null;

        if (gameState.team1Total < gameState.team2Total) {
          $.team1Card.classList.add('total-highlight', 'total-pulse');
          gameState.lastTurn = 1;
          currentOutlined = 1;
        } else if (gameState.team2Total < gameState.team1Total) {
          $.team2Card.classList.add('total-highlight', 'total-pulse');
          gameState.lastTurn = 2;
          currentOutlined = 2;
        } else if (gameState.lastTurn === 1) {
          $.team1Card.classList.add('total-highlight', 'total-pulse');
          currentOutlined = 1;
        } else if (gameState.lastTurn === 2) {
          $.team2Card.classList.add('total-highlight', 'total-pulse');
          currentOutlined = 2;
        }

        if (currentOutlined && currentOutlined !== prevTurnOutlined) {
          const target = currentOutlined === 1 ? $.team1Card : $.team2Card;
          target.classList.add('turn-pulse');
          setTimeout(() => target.classList.remove('turn-pulse'), 600);
        }
        prevTurnOutlined = currentOutlined;
      }

      if (!$.historyList || !$.emptyHistory) return;

      if (gameState.history.length === 0) {
        $.emptyHistory.classList.remove('hidden');
        $.historyList.classList.add('hidden');
        $.historyList.innerHTML = '';
        return;
      }

      $.emptyHistory.classList.add('hidden');
      $.historyList.classList.remove('hidden');

      const t = I18N_UI[currentLangUI];
      const getScoreClass = (score) => score > 0 ? 'win' : (score < 0 ? 'lose' : '');
      const formatScore = (score) => score > 0 ? `+${score}` : String(score);
      const getShelemHistoryClass = (score) => {
        if (score >= 800) return 'shelem-gold';
        if (score >= 400) return 'shelem-green';
        if (score <= -300) return 'shelem-red';
        return '';
      };
      let running1 = 0, running2 = 0;

      const rows = gameState.history.map((round, index) => {
        const eff1 = round.effective1 !== undefined ? round.effective1 : round.score1;
        const eff2 = round.effective2 !== undefined ? round.effective2 : round.score2;
        running1 += eff1;
        running2 += eff2;
        const totalMultiplier = gameState.gameType === 'shelem' ? 1 : 10;
        const total1 = running1 * totalMultiplier;
        const total2 = running2 * totalMultiplier;
        const suitTag = round.suit ? ` <span style="font-size:16px;vertical-align:-1px;">${round.suit}</span>` : '';
        const roundLabel1 = currentLangUI === 'fa' ? `دست ${index + 1}: ${total1}${suitTag}` : `R${index + 1}: ${total1}${suitTag}`;
        const roundLabel2 = currentLangUI === 'fa' ? `دست ${index + 1}: ${total2}${suitTag}` : `R${index + 1}: ${total2}${suitTag}`;
        const score1 = `<div class="delta ${getScoreClass(eff1)}">${formatScore(eff1)}</div>`;
        const score2 = `<div class="delta ${getScoreClass(eff2)}">${formatScore(eff2)}</div>`;
        const team1Class = gameState.gameType === 'shelem' ? getShelemHistoryClass(eff1) : (round.points1 > 0 ? 'milestone' : '');
        const team2Class = gameState.gameType === 'shelem' ? getShelemHistoryClass(eff2) : (round.points2 > 0 ? 'milestone' : '');

        return `<div class="row">
            <div class="mini ${team1Class}">
              ${score1}
              <div class="line">${roundLabel1}</div>
            </div>
            <div class="mini ${team2Class}">
              ${score2}
              <div class="line">${roundLabel2}</div>
            </div>
          </div>`;
      }).reverse().join('');

      $.historyList.innerHTML = rows;
    }

    const escapeHtmlMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, ch => escapeHtmlMap[ch]);
    }

    function checkWinner() {
      const t = I18N_UI[currentLangUI];
      const targetScore = getTargetScore();
      if (gameState.gameType === 'shelem') {
        if (gameState.team1Total >= targetScore || gameState.team2Total >= targetScore) {
          const winner = gameState.team1Total >= targetScore && gameState.team1Total >= gameState.team2Total ? gameState.team1Name : gameState.team2Name;
          const winnerScore = Math.max(gameState.team1Total, gameState.team2Total);
          showWinner(winner, t.winnerScoreSimple(winnerScore));
        }
        return;
      }

      const pointsDiff = Math.abs(gameState.team1Points - gameState.team2Points);

      if ((gameState.team1Total >= targetScore || gameState.team2Total >= targetScore) && pointsDiff >= 1) {
        const winner = gameState.team1Points > gameState.team2Points ? gameState.team1Name : gameState.team2Name;
        const winnerScore = Math.max(gameState.team1Total, gameState.team2Total);
        const winnerPoints = Math.max(gameState.team1Points, gameState.team2Points);
        showWinner(winner, t.winnerScore(winnerScore, winnerPoints));
      }
    }

    function showWinner(name, message) {
      Haptic.success();
      gameState.winner = name;
      const winnerNameEl = document.getElementById('winnerName');
      const winnerMessageEl = document.getElementById('winnerMessage');
      if (winnerNameEl) winnerNameEl.textContent = getDisplayTeamName(name);
      if (winnerMessageEl) {
        winnerMessageEl.textContent = message;
        if (currentLangUI === "fa") {
          localizeDisplayedNumbersUI();
        }
      }
      if ($.winnerOverlay) $.winnerOverlay.classList.add('show');
      if ($.result1) $.result1.disabled = true;
      if ($.result2) $.result2.disabled = true;
      setPickersEnabled(false);
      enablePills(false);
      archiveCurrentGame();
    }

    function closeWinner() {
      Haptic.light();
      if ($.winnerOverlay) $.winnerOverlay.classList.remove('show');
    }

    // ── History & Round Management ───────────────────────────────────────────
    // Round editing/deletion, game history, and reset

    // --- History View & Interaction ---

    function openSheet(idx) {
      Haptic.heavy();
      sheetIndex = idx;
      if ($.sheetOverlay) $.sheetOverlay.classList.add('show');
    }

    function closeSheet() {
      if ($.sheetOverlay) $.sheetOverlay.classList.remove('show');
      sheetIndex = null;
    }

    function sheetEdit() {
      if (sheetIndex !== null) editRound(sheetIndex);
      closeSheet();
    }

    function sheetDelete() {
      if (sheetIndex !== null) deleteRound(sheetIndex);
      closeSheet();
    }

    function setupLongPress() {
      if (!$.historyList) return;
      $.historyList.addEventListener('touchstart', (e) => {
        const row = e.target.closest('.row');
        if (!row) return;
        const idx = Array.from($.historyList.querySelectorAll('.row')).indexOf(row);
        if (idx === -1) return;
        pressTimer = setTimeout(() => openSheet(idx), 420);
      }, { passive: true });
      $.historyList.addEventListener('touchmove', () => clearTimeout(pressTimer), { passive: true });
      $.historyList.addEventListener('touchend', () => clearTimeout(pressTimer), { passive: true });
    }

    function deleteRound(index) {
      const actualIndex = gameState.history.length - 1 - index;
      const round = gameState.history[actualIndex];
      if (!round) return;

      gameState.team1Total -= (round.effective1 !== undefined ? round.effective1 : round.score1);
      gameState.team2Total -= (round.effective2 !== undefined ? round.effective2 : round.score2);
      gameState.team1Points -= round.points1;
      gameState.team2Points -= round.points2;

      gameState.history.splice(actualIndex, 1);

      gameState.winner = null;
      closeWinner();
      if ($.result1) $.result1.disabled = false;
      if ($.result2) $.result2.disabled = false;
      setPickersEnabled(true);
      enablePills(true);

      updateUI();
      checkWinner();
      saveGameState();
    }

    function editRound(index) {
      const t = I18N_UI[currentLangUI];
      const actualIndex = gameState.history.length - 1 - index;
      const round = gameState.history[actualIndex];
      if (!round) return;

      const team1ScoreInput = prompt(t.promptEditScore(getDisplayTeamName(gameState.team1Name)), round.score1);
      if (team1ScoreInput === null) return;
      const team2ScoreInput = prompt(t.promptEditScore(getDisplayTeamName(gameState.team2Name)), round.score2);
      if (team2ScoreInput === null) return;

      const newScore1 = parseInt(team1ScoreInput, 10);
      const newScore2 = parseInt(team2ScoreInput, 10);

      const bounds = getScoreBounds();
      if (isNaN(newScore1) || isNaN(newScore2) || newScore1 < bounds.min || newScore1 > bounds.max || newScore2 < bounds.min || newScore2 > bounds.max) {
        alert(t.alertResultRange(bounds.max));
        return;
      }

      gameState.team1Total -= (round.effective1 !== undefined ? round.effective1 : round.score1);
      gameState.team2Total -= (round.effective2 !== undefined ? round.effective2 : round.score2);
      gameState.team1Points -= round.points1 || 0;
      gameState.team2Points -= round.points2 || 0;

      let newPoints1 = 0, newPoints2 = 0;
      if (gameState.gameType === 6) {
        if (newScore1 > 0 && (newScore1 === 6 || newScore1 === 8)) newPoints1 = 1;
        if (newScore2 > 0 && (newScore2 === 6 || newScore2 === 8)) newPoints2 = 1;
      } else if (gameState.gameType === 7) {
        if (newScore1 > 0 && (newScore1 === 7 || newScore1 === 9)) newPoints1 = 1;
        if (newScore2 > 0 && (newScore2 === 7 || newScore2 === 9)) newPoints2 = 1;
      } else if (gameState.gameType === 8) {
        if (newScore1 > 0 && newScore1 === 8) newPoints1 = 1;
        if (newScore2 > 0 && newScore2 === 8) newPoints2 = 1;
      } else if (gameState.gameType === 9) {
        if (newScore1 > 0 && newScore1 === 9) newPoints1 = 1;
        if (newScore2 > 0 && newScore2 === 9) newPoints2 = 1;
      }

      // Apply 8/9 Ejbar special rule for edited scores too
      let newEffective1 = newScore1;
      let newEffective2 = newScore2;
      if (gameState.gameType === 8 || gameState.gameType === 9) {
        if (newScore1 === 10) newEffective1 = 20;
        if (newScore2 === 10) newEffective2 = 20;
        if (newScore1 === -10) newEffective1 = -10;
        if (newScore2 === -10) newEffective2 = -10;
      }

      gameState.team1Total += newEffective1;
      gameState.team2Total += newEffective2;
      gameState.team1Points += newPoints1;
      gameState.team2Points += newPoints2;

      gameState.history[actualIndex] = {
        score1: newScore1, score2: newScore2,
        effective1: newEffective1, effective2: newEffective2,
        points1: newPoints1, points2: newPoints2
      };

      gameState.winner = null;
      closeWinner();
      if ($.result1) $.result1.disabled = false;
      if ($.result2) $.result2.disabled = false;
      setPickersEnabled(true);
      enablePills(true);

      updateUI();
      checkWinner();
      saveGameState();
    }

    function newGame() {
      const t = I18N_UI[currentLangUI];
      if (!confirm(t.confirmNewGame)) return;
      Haptic.medium();
      archiveCurrentGame();

      gameState = {
        lastTurn: 1,
        gameType: null,
        team1Name: 'Ma',
        team2Name: 'Shoma',
        team1Total: 0,
        team2Total: 0,
        team1Points: 0,
        team2Points: 0,
        history: [],
        winner: null
      };

      if ($.result1) $.result1.disabled = false;
      if ($.result2) $.result2.disabled = false;
      setPickersEnabled(true);
      if (picker1) picker1.setValue(0);
      if (picker2) picker2.setValue(0);
      clearDirectInputs();
      updateMinusBtnState(1); updateMinusBtnState(2);
      resetSuit();

      closeWinner();
      const newGameBtn = document.querySelector('#gameScreen .btn.btn-secondary');
      squircleReveal(newGameBtn, () => {
        if ($.gameScreen) $.gameScreen.classList.add('hidden');
        if ($.setupScreen) $.setupScreen.classList.remove('hidden');
        document.querySelectorAll('.seg-btn').forEach(btn => btn.classList.remove('selected'));
        document.querySelectorAll('.ejbar-opt').forEach(btn => btn.classList.remove('selected'));
        closeEjbarDropdown();
        const ejbarMainBtnReset = document.getElementById('ejbarMainBtn');
        if (ejbarMainBtnReset) ejbarMainBtnReset.textContent = I18N_UI[currentLangUI].labels.ejbar;

        if ($.team1Name) $.team1Name.value = getDisplayTeamName('Ma');
        if ($.team2Name) $.team2Name.value = getDisplayTeamName('Shoma');
        if ($.targetHint) $.targetHint.textContent = 'Target: —';
        updateScoreInputMode();
        updateUI();
        try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
      });
    }

    function clearHistory() {
      const t = I18N_UI[currentLangUI];
      if (!confirm(t.confirmClearHistory)) return;
      Haptic.warning();

      gameState.history = [];
      gameState.team1Total = 0;
      gameState.team2Total = 0;
      gameState.team1Points = 0;
      gameState.team2Points = 0;
      gameState.lastTurn = 1;
      prevTurnOutlined = null;
      gameState.winner = null;

      if ($.result1) $.result1.disabled = false;
      if ($.result2) $.result2.disabled = false;
      setPickersEnabled(true);
      if (picker1) picker1.setValue(0);
      if (picker2) picker2.setValue(0);
      clearDirectInputs();
      updateMinusBtnState(1); updateMinusBtnState(2);
      resetSuit();
      enablePills(true);

      closeWinner();
      updateUI();
      saveGameState();
    }

    function syncSubmitEnabled() {
      if (!$.submitBtn || !$.result1 || !$.result2) return;

      if (gameState.gameType === 'shelem') {
        const raw1 = toEnDigitsUI(($.directInput1?.value ?? '').trim());
        const raw2 = toEnDigitsUI(($.directInput2?.value ?? '').trim());
        const n1 = parseShelemScoreValue(raw1);
        const n2 = parseShelemScoreValue(raw2);
        const ok = raw1 !== '' && raw2 !== '' && n1 !== null && n2 !== null;
        $.submitBtn.disabled = !ok;
        $.submitBtn.classList.toggle('is-disabled', !ok);
        return;
      }

      const n1 = parseScoreValue($.result1.value);
      const n2 = parseScoreValue($.result2.value);
      const ok = n1 !== null && n2 !== null;
      $.submitBtn.disabled = !ok;
      $.submitBtn.classList.toggle('is-disabled', !ok);
    }

    document.addEventListener('DOMContentLoaded', () => {
      initDOMElements();
      loadGameState();

      if (gameState.gameType !== null) {
        document.querySelectorAll('.seg-btn').forEach(btn => btn.classList.remove('selected'));
        document.querySelectorAll('.ejbar-opt').forEach(btn => btn.classList.remove('selected'));
        if (gameState.gameType === 'shelem') {
          const sel = document.querySelector('[data-type="shelem"]');
          if (sel) sel.classList.add('selected');
        } else {
          const ejbarBtn = document.querySelector('[data-type="ejbar-group"]');
          if (ejbarBtn) ejbarBtn.classList.add('selected');
          const opt = document.querySelector(`.ejbar-opt[data-subtype="${gameState.gameType}"]`);
          if (opt) opt.classList.add('selected');
          const ejbarMainBtn = document.getElementById('ejbarMainBtn');
          if (ejbarMainBtn) ejbarMainBtn.textContent = getGameTypeLabel(gameState.gameType);
        }
      }
      initPickers();
      setupLongPress();
      if (gameState.gameType === 'shelem') {
        clearDirectInputs();
        updateMinusBtnState(1); updateMinusBtnState(2);
        if ($.result1) $.result1.value = '';
        if ($.result2) $.result2.value = '';
      } else {
        if (picker1) picker1.refresh();
        if (picker2) picker2.refresh();
      }

      if ($.submitBtn) {
        $.submitBtn.addEventListener('click', () => {
          if ($.submitBtn.disabled) return;
          addScore();
          syncSubmitEnabled();
        });
      }
      if ($.result1) $.result1.addEventListener('input', syncSubmitEnabled);
      if ($.result2) $.result2.addEventListener('input', syncSubmitEnabled);
      if ($.directInput1) $.directInput1.addEventListener('input', () => { syncSubmitEnabled(); updateMinusBtnState(1); });
      if ($.directInput2) $.directInput2.addEventListener('input', () => { syncSubmitEnabled(); updateMinusBtnState(2); });
      updateScoreInputMode();
      syncSubmitEnabled();

      // ---- Install / Share Lottie init ----
      if (window.lottie) {
        const installEl = document.getElementById('installLottie');
        const shareEl   = document.getElementById('shareLottie');
        if (installEl) {
          window.installLottieAnim = lottie.loadAnimation({ container: installEl, renderer: 'svg', loop: false, autoplay: false, animationData: MOVE_DOWN_LOTTIE_DATA });
          window.installLottieAnim.goToAndStop(89, true);
        }
        if (shareEl) {
          window.shareLottieAnim = lottie.loadAnimation({ container: shareEl, renderer: 'svg', loop: false, autoplay: false, animationData: SHARE_LOTTIE_DATA });
          window.shareLottieAnim.goToAndStop(89, true);
        }
        const installBtn = document.getElementById('installBtn');
        if (installBtn) {
          installBtn.addEventListener('mouseenter', () => {
            if (installBtn.dataset.mode === 'share') { if (window.shareLottieAnim) window.shareLottieAnim.goToAndPlay(0, true); }
            else { if (window.installLottieAnim) window.installLottieAnim.goToAndPlay(0, true); }
          });
          installBtn.addEventListener('touchstart', () => {
            if (installBtn.dataset.mode === 'share') { if (window.shareLottieAnim) window.shareLottieAnim.goToAndPlay(0, true); }
            else { if (window.installLottieAnim) window.installLottieAnim.goToAndPlay(0, true); }
          }, { passive: true });
        }
      }
      if (localStorage.getItem('appInstalled') === 'true') switchToShareMode();

      // ---- Theme Lottie init ----
      if (window.lottie) {
        const moonEl = document.getElementById('themeLottieMoon');
        const sunEl  = document.getElementById('themeLottieSun');
        if (moonEl && sunEl) {
          window.moonLottieAnim = lottie.loadAnimation({ container: moonEl, renderer: 'svg', loop: false, autoplay: false, animationData: MOON_LOTTIE_DATA });
          window.sunLottieAnim  = lottie.loadAnimation({ container: sunEl,  renderer: 'svg', loop: false, autoplay: false, animationData: SUN_LOTTIE_DATA  });
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          moonEl.style.opacity = isDark ? '0' : '1';
          sunEl.style.opacity  = isDark ? '1' : '0';
          window.moonLottieAnim.goToAndStop(89, true);
          window.sunLottieAnim.goToAndStop(89, true);
        }
      }
    });

    function localizeDisplayedNumbersUI(){
      const makeFa = (currentLangUI === "fa");

      const toFa = (s)=>toFaDigitsUI(toEnDigitsUI(s));
      const toEn = (s)=>toEnDigitsUI(s);

      function localizeTextNodes(root){
        if(!root) return;
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
        let n;
        while((n = walker.nextNode())){
          const v = n.nodeValue;

      });

      // Odometer totals: localize digit text inside spans
      ["team1Total","team2Total"].forEach(id=>{
        const el = document.getElementById(id);
        if(!el) return;
        const digitSpans = el.querySelectorAll('.digit-slide .d, .odo-sep');
        if(digitSpans.length > 0) {
          digitSpans.forEach(s => {
            s.textContent = makeFa ? toFa(s.textContent) : toEn(s.textContent);

          el.textContent = makeFa ? toFa(el.textContent) : toEn(el.textContent);

      // History: preserve DOM nodes & event listeners

        if(makeFa){
          if(txt.startsWith("R")){
            el.textContent = "دست " + toFaDigitsUI(txt.slice(1));
          } else {
            el.textContent = toFa(txt);
          }
        } else {
          if(txt.startsWith("دست")){
            const n = txt.replace("دست", "").trim();
            el.textContent = "R" + toEnDigitsUI(n);
          } else {
            el.textContent = toEn(txt);
          }
        }
      });

      // Picker items: localize displayed numbers
      document.querySelectorAll(".picker-item").forEach(el=>{
        const v = el.getAttribute("data-value");
        el.textContent = makeFa ? toFa(v) : v;
      });
    }

    function applyLangUI(lang, opts = {}){
      const animateMatrix = !!opts.animateMatrix;
      const matrixTargets = animateMatrix ? [] : null;
      const setTranslatedText = (el, text) => {
        if (!el) return;
        el.textContent = text;
        if (matrixTargets && text && String(text).trim()) matrixTargets.push(el);
      };

      currentLangUI = (lang === "fa") ? "fa" : "en";
      localStorage.setItem("lang", currentLangUI);
      const t = I18N_UI[currentLangUI];

      document.documentElement.dir = (currentLangUI === "fa") ? "rtl" : "ltr";
      document.documentElement.lang = currentLangUI;

      // Header
      const titleEl = document.querySelector(".title");
      setTranslatedText(titleEl, t.title);

      // Setup screen titles
      const setupTitle = document.querySelector("#setupScreen .section-title h2");
      const setupHint = document.querySelector("#setupScreen .section-title .hint");
      setTranslatedText(setupTitle, t.selectGame);
      setTranslatedText(setupHint, t.choose);

      // Setup labels and placeholders
      const setupLabels = document.querySelectorAll("#setupScreen .field label");
      if(setupLabels && setupLabels.length >= 2){
        setTranslatedText(setupLabels[0], t.team1NameLabel);
        setTranslatedText(setupLabels[1], t.team2NameLabel);
      }
      const tn1 = document.getElementById("team1Name");
      const tn2 = document.getElementById("team2Name");
      if(tn1) { tn1.placeholder = t.team1Placeholder; if (tn1.value) tn1.value = getDisplayTeamName(tn1.value); }
      if(tn2) { tn2.placeholder = t.team2Placeholder; if (tn2.value) tn2.value = getDisplayTeamName(tn2.value); }

      const startBtn = document.querySelector("#setupScreen .btn.btn-primary");
      setTranslatedText(startBtn, t.start);

      // Segmented labels
      document.querySelectorAll(".seg-btn").forEach(btn=>{
        const type = btn.getAttribute("data-type");
        if(type === "ejbar-group") setTranslatedText(btn, t.labels.ejbar);
        if(type === "shelem") setTranslatedText(btn, t.labels.shelem);
      });
      document.querySelectorAll(".ejbar-opt").forEach(btn=>{
        const sub = btn.getAttribute("data-subtype");
        if(sub === "6") setTranslatedText(btn, t.labels.game6 + " " + t.labels.ejbar);
        if(sub === "7") setTranslatedText(btn, t.labels.game7 + " " + t.labels.ejbar);
        if(sub === "8") setTranslatedText(btn, t.labels.game8 + " " + t.labels.ejbar);
        if(sub === "9") setTranslatedText(btn, t.labels.game9 + " " + t.labels.ejbar);
      });

      // Game screen titles
      const sbH2 = document.querySelector("#gameScreen .section:nth-of-type(1) .section-title h2");
      setTranslatedText(sbH2, getGameTitle(t));
      const histH2 = document.querySelector("#gameScreen .section:nth-of-type(2) .section-title h2");
      setTranslatedText(histH2, t.history);
      const histHint = document.querySelector("#gameScreen .section:nth-of-type(2) .section-title .hint");
      setTranslatedText(histHint, t.mostRecent);

      // Action buttons (New Game / Clear)
      const actionBtns = document.querySelectorAll(".actions .btn");
      if(actionBtns && actionBtns.length >= 2){
        setTranslatedText(actionBtns[0], t.newGame);
        setTranslatedText(actionBtns[1], t.clear);
      }

      // Submit button
      const submitBtn = document.getElementById("submitBtn");
      setTranslatedText(submitBtn, t.submit);

      // Empty history message
      const emptyHistory = document.getElementById("emptyHistory");
      setTranslatedText(emptyHistory, t.noRounds);

      // Sheet buttons
      const sheetBtns = document.querySelectorAll(".sheet-btn");
      if(sheetBtns && sheetBtns.length >= 3){
        setTranslatedText(sheetBtns[0], t.editRound);
        setTranslatedText(sheetBtns[1], t.deleteRound);
        setTranslatedText(sheetBtns[2], t.cancel);
      }

      // Winner close
      const closeBtn = document.querySelector("#winnerOverlay .btn");
      setTranslatedText(closeBtn, t.close);

      // Chip label
      const chipSmall = document.querySelector(".icon-chip .small");
      setTranslatedText(chipSmall, t.scorer);

      const chip = document.querySelector(".icon-chip");
      if(chip) chip.title = t.cardGameScorer;

      // Tooltips
      const themeBtn = document.querySelector('button[onclick="toggleTheme()"]');
      if(themeBtn){ themeBtn.title = t.theme; themeBtn.setAttribute("aria-label", t.theme); }
      const langBtn = document.querySelector('button[onclick="toggleLang()"]');
      if(langBtn){ langBtn.title = t.language; langBtn.setAttribute("aria-label", t.language); }
      const installBtnEl = document.getElementById("installBtn");
      const installBtnText = document.getElementById("installBtnText");
      const isShareMode = installBtnEl && installBtnEl.dataset.mode === 'share';
      setTranslatedText(installBtnText, isShareMode ? t.shareApp : t.installApp);
      if(installBtnEl){ const lbl=isShareMode?t.shareApp:t.installApp; installBtnEl.title=lbl; installBtnEl.setAttribute("aria-label",lbl); }

      // Team-dependent labels (UI only)
      try{
        if(window.gameState){
          const r1 = document.getElementById("resultLabel1");
          const r2 = document.getElementById("resultLabel2");
          setTranslatedText(r1, `${getDisplayTeamName(gameState.team1Name)} ${t.wonWord}`);
          setTranslatedText(r2, `${getDisplayTeamName(gameState.team2Name)} ${t.wonWord}`);
        }
      }catch(_){}

      // Target hint (UI only)
      if($.targetHint && typeof getTargetScore === "function"){
        const msg = t.target(getTargetScore());
        setTranslatedText($.targetHint, (currentLangUI === "fa") ? toFaDigitsUI(msg) : msg);
      }

      updateTeamNames();
      const winnerNameEl = document.getElementById('winnerName');
      if (winnerNameEl && gameState && gameState.winner) {
        winnerNameEl.textContent = getDisplayTeamName(gameState.winner);
      }
      renderArchive();
      localizeDisplayedNumbersUI();
      runMatrixTranslationAnimation(matrixTargets, currentLangUI);
    }

    function toggleLang(){
      Haptic.light();
      const next = currentLangUI === "en" ? "fa" : "en";
      const btn = document.querySelector('button[onclick="toggleLang()"]');
      squircleReveal(btn, () => applyLangUI(next, { animateMatrix: true }));
    }

    // UI-only: Wrap updateUI to localize digits after each render. Does not change game logic.
    (function() {
      if (typeof updateUI === "function"){
        const __updateUI_UI = updateUI;
        updateUI = function(){
          __updateUI_UI();
          updateTeamNames();
          localizeDisplayedNumbersUI();
        };
      }
    })();

    // Init language
    document.addEventListener("DOMContentLoaded", ()=>applyLangUI(currentLangUI));

</script>

<script>
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt=e;
  const btn=document.getElementById('installBtn');
  if(btn) btn.classList.remove('hidden');
});
function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.finally(()=>{
    deferredPrompt=null;
  });
}
function switchToShareMode(){
  const btn=document.getElementById('installBtn');
  if(!btn) return;
  btn.dataset.mode='share';
  btn.removeAttribute('onclick');
  btn.onclick=shareApp;
  const installEl=document.getElementById('installLottie');
  const shareEl=document.getElementById('shareLottie');
  if(installEl) installEl.style.display='none';
  if(shareEl) shareEl.style.display='';
  const textEl=document.getElementById('installBtnText');
  if(textEl){
    const t=typeof I18N_UI!=='undefined'&&I18N_UI[localStorage.getItem('lang')||'en'];
    textEl.textContent=t&&t.shareApp?t.shareApp:'Share the App';
  }
  btn.classList.remove('hidden');
}
function shareApp(){
  const url=location.href;
  const title=document.title;
  if(navigator.share){
    navigator.share({title,url}).catch(()=>{});
  } else {
    navigator.clipboard&&navigator.clipboard.writeText(url).catch(()=>{});
  }
  if(window.shareLottieAnim) window.shareLottieAnim.goToAndPlay(0,true);
}
window.addEventListener('appinstalled', ()=>{
  deferredPrompt=null;
  localStorage.setItem('appInstalled','true');
  switchToShareMode();
});
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
}
</script>
